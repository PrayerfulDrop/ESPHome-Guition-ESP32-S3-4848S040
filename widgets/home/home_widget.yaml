switch:
  - platform: template
    name: "Touchscreen block"
    id: display_lock_switch
    lambda: |-
      return id(display_lock);
    turn_on_action:
      - lambda: 'id(display_lock) = true;' 
      - lvgl.button.update: 
          id: home_page_btn
          clickable: false
      - lvgl.button.update: 
          id: lights_group_page_btn
          clickable: false
      - lvgl.button.update: 
          id: devices_page_btn
          clickable: false
      - lvgl.button.update: 
          id: settings_page_btn
          clickable: false
      - lvgl.label.update:
          id: lock_status
          text_color: color_green
    turn_off_action:
      - lambda: 'id(display_lock) = false;' 
      - lvgl.button.update: 
          id: home_page_btn
          clickable: true
      - lvgl.button.update: 
