substitutions:
  lock_icon:               "\U0000e92e"
  air_conditioner_icon:    "\U0000e93b" 
  heating_icon:            "\U0000e936"
  info_icon:               "\U0000e904" 
  ha_icon:                 "\U0000e935" # home assistant
  wifi_25_icon:            "\U0000e931" # wifi signal from 25% to 1%
  wifi_50_icon:            "\U0000e932" # wifi signal from 50% to 25%
  wifi_75_icon:            "\U0000e933" # wifi signal from 75% to 50%
  wifi_100_icon:           "\U0000e934" # wifi signal from 100% to 75% or disable
  humidity_icon:           "\U0000e938" 
  co2_icon:                "\U0000e937" 
  tvoc:                    "\U0000e93a" # air quality
  temperature_icon:        "\U0000e939" 
  illumination:            "\U0000e92f" # lux

globals:
  - id: display_lock
    type: bool
    restore_value: true
    initial_value: "false"


sensor:
  # WI-FI Signal
  - platform: wifi_signal
    id: wifi_signal_percent
    update_interval: 30s
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    on_value:
      then:
        - lvgl.label.update:
            id: wifi_status
            text_color: !lambda |-
              if (id(wifi_signal_percent).state > 0) {
              return lv_color_hex(0x5CA848);
              }
              return lv_color_hex(0xFF0000);
            text: !lambda |-
              if (id(wifi_signal_percent).state > 0 && id(wifi_signal_percent).state < 26) {
              return "${wifi_25_icon}";
              } else if (id(wifi_signal_percent).state > 25 && id(wifi_signal_percent).state < 51) {
              return "${wifi_50_icon}";
              } else if (id(wifi_signal_percent).state > 50 && id(wifi_signal_percent).state < 76) {
              return "${wifi_75_icon}";
              } else if (id(wifi_signal_percent).state > 75) {
              return "${wifi_100_icon}";
              }
              return "${wifi_100_icon}";

  # Weather temperature sensor
  - platform: homeassistant
    id: weather_temp
    entity_id: "${weather_entity}"
    attribute: temperature
    on_value: 
      then:
        - lvgl.label.update:
            id: weather_temperature
            text:
              format: "%.0f°"
              args: [id(weather_temp).state]

  # Indoor temperature — kept for HVAC climate component
  - platform: homeassistant
    id: temperature_sensor
    entity_id: "${temperature_entity}"


text_sensor:
  # Sun horizon sensor
  - platform: homeassistant
    id: sun_state_sensor
    entity_id: sun.sun

  # Weather state sensor
  - platform: homeassistant
    id: weather_state_sensor
    entity_id: "${weather_entity}"
    on_value: 
      then:
        - delay: 1s
        - script.execute:
            id: weather_get_and_set_translated_state
            state_str: !lambda 'return id(weather_state_sensor).state;'
        - script.execute: update_weather_image

  # Calendar next event title
  - platform: homeassistant
    id: calendar_event_title
    entity_id: "${calendar_entity}"
    attribute: message
    on_value:
      then:
        - lvgl.label.update:
            id: calendar_title_label
            text: !lambda return x;

  # Calendar next event start time
  - platform: homeassistant
    id: calendar_event_start
    entity_id: "${calendar_entity}"
    attribute: start_time
    on_value:
      then:
        - lvgl.label.update:
            id: calendar_start_label
            text: !lambda |-
              if (x.length() < 10) return x;
              int month = std::stoi(x.substr(5, 2));
              int day   = std::stoi(x.substr(8, 2));
              static const char* months[] = {
                "Jan","Feb","Mar","Apr","May","Jun",
                "Jul","Aug","Sep","Oct","Nov","Dec"
              };
              char buf[32];
              if (x.length() >= 19 && x[10] == ' ') {
                int hour = std::stoi(x.substr(11, 2));
                int min  = std::stoi(x.substr(14, 2));
                const char* ap = (hour >= 12) ? "pm" : "am";
                if (hour > 12) hour -= 12;
                if (hour == 0) hour = 12;
                if (min == 0)
                  snprintf(buf, sizeof(buf), "%s %d  %d%s", months[month-1], day, hour, ap);
                else
                  snprintf(buf, sizeof(buf), "%s %d  %d:%02d%s", months[month-1], day, hour, min, ap);
              } else {
                snprintf(buf, sizeof(buf), "%s %d  (all day)", months[month-1], day);
              }
              return std::string(buf);

  # Calendar next event end time
  - platform: homeassistant
    id: calendar_event_end
    entity_id: "${calendar_entity}"
    attribute: end_time
    on_value:
      then:
        - lvgl.label.update:
            id: calendar_end_label
            text: !lambda |-
              if (x.length() < 10) return x;
              int month = std::stoi(x.substr(5, 2));
              int day   = std::stoi(x.substr(8, 2));
              static const char* months[] = {
                "Jan","Feb","Mar","Apr","May","Jun",
                "Jul","Aug","Sep","Oct","Nov","Dec"
              };
              char buf[32];
              if (x.length() >= 19 && x[10] == ' ') {
                int hour = std::stoi(x.substr(11, 2));
                int min  = std::stoi(x.substr(14, 2));
                const char* ap = (hour >= 12) ? "pm" : "am";
                if (hour > 12) hour -= 12;
                if (hour == 0) hour = 12;
                if (min == 0)
                  snprintf(buf, sizeof(buf), "%s %d  %d%s", months[month-1], day, hour, ap);
                else
                  snprintf(buf, sizeof(buf), "%s %d  %d:%02d%s", months[month-1], day, hour, min, ap);
              } else {
                snprintf(buf, sizeof(buf), "%s %d  (all day)", months[month-1], day);
              }
              return std::string(buf);

  # Calendar active state (on = event happening now, off = next upcoming)
  - platform: homeassistant
    id: calendar_state
    entity_id: "${calendar_entity}"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(calendar_state).state == "on";'
            then:
              - lvgl.label.update:
                  id: calendar_status_label
                  text: "Now Active"
                  text_color: color_green
            else:
              - lvgl.label.update:
                  id: calendar_status_label
                  text: "Upcoming"
                  text_color: color_steel_blue

