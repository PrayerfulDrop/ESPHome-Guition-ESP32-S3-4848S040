    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.label.update: 
              id: ha_status
              text_color: color_blue
    - if:
        condition:
          lambda: 'return id(weather_state_sensor).has_state();'
        then:
          - script.execute:
              id: weather_get_and_set_translated_state
              state_str: !lambda 'return id(weather_state_sensor).state;'

    # - if:
    #     condition:
    #       lambda: 'return id(display_lock) == true;'
    #     then:
    #       - switch.turn_on: display_lock_switch
    #     else:
    #       - switch.turn_off: display_lock_switch

  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.label.update: 
              id: ha_status
              text_color: color_steel_blue

switch:
  - platform: template
    name: "Touchscreen block"
    id: display_lock_switch
    lambda: |-
      return id(display_lock);
    turn_on_action:
      - lambda: 'id(display_lock) = true;' 
      - lvgl.button.update: 
          id: home_page_btn
          clickable: false
      - lvgl.button.update: 
          id: lights_group_page_btn
          clickable: false
      - lvgl.button.update: 
          id: devices_page_btn
          clickable: false
      - lvgl.button.update: 
          id: settings_page_btn
          clickable: false
    turn_off_action:
      - lambda: 'id(display_lock) = false;'
      - lvgl.button.update:
          id: home_page_btn
          clickable: true
      - lvgl.button.update:
          id: lights_group_page_btn
          clickable: true
      - lvgl.button.update:
          id: devices_page_btn
          clickable: true
      - lvgl.button.update:
          id: settings_page_btn
          clickable: true
