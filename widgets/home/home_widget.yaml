time:
  - platform: homeassistant
    id: homeassistant_time
#  - platform: sntp
#    id: sntp_time
#    timezone: ${time_zone}
#    servers:
#     - ntp0.ntp-servers.net
#     - ntp1.ntp-servers.net
#     - ntp2.ntp-servers.net
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

script:

  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[16];
            auto now = id(homeassistant_time).now();
            const char *ampm = (now.hour >= 12) ? "PM" : "AM"; 
            int hour_12 = (now.hour % 12 == 0) ? 12 : now.hour % 12;           
            snprintf(time_buf, sizeof(time_buf), "%d:%02d %s", hour_12, now.minute, ampm);
            return time_buf;

      - lvgl.label.update:
          id: display_date
          text: !lambda |-
            static char date_buf[32];
            auto now = id(homeassistant_time).now();
            static const char* days[] = {"Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"};
            snprintf(date_buf, sizeof(date_buf), "%s, %d/%02d/%04d", days[(now.day_of_week)-1], now.month, now.day_of_month, now.year);
            return date_buf;

  - id: weather_get_and_set_translated_state
    parameters:
      state_str: string
    then:   
      - lambda: |-
          std::string state = state_str;

          auto it = id(weather_translations).find(state);
          std::string translated_state = (it != id(weather_translations).end()) ? it->second : state;
 
          lv_label_set_text(id(weather_state_label), translated_state.c_str());

  - id: update_weather_image
    then:
      - lambda: |-
          std::string weather = id(weather_state_sensor).state;
          bool is_night = (id(sun_state_sensor).state == "below_horizon");

          lv_obj_add_flag(id(weather_sunny_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_clear_night_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_cloudy_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_partlycloudy_sun_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_partlycloudy_moon_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_rainy_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_pouring_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_snowy_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_snowy_rainy_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_fog_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_hail_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_lightning_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_lightning_rainy_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_windy_image), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(weather_windy_variant_image), LV_OBJ_FLAG_HIDDEN);

          if (weather == "cloudy") {
              lv_obj_clear_flag(id(weather_cloudy_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "partlycloudy") {
            if (is_night) {
              lv_obj_clear_flag(id(weather_partlycloudy_moon_image), LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_clear_flag(id(weather_partlycloudy_sun_image), LV_OBJ_FLAG_HIDDEN);
            }
          } else if (weather == "sunny" || weather == "clear-night") {
            if (is_night) {
              lv_obj_clear_flag(id(weather_clear_night_image), LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_clear_flag(id(weather_sunny_image), LV_OBJ_FLAG_HIDDEN);
            }
          } else if (weather == "rainy") {
            lv_obj_clear_flag(id(weather_rainy_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "lightning-rainy") {
            lv_obj_clear_flag(id(weather_lightning_rainy_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "lightning") {
            lv_obj_clear_flag(id(weather_lightning_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "pouring") {
            lv_obj_clear_flag(id(weather_pouring_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "snowy") {
            lv_obj_clear_flag(id(weather_snowy_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "snowy-rainy") {
            lv_obj_clear_flag(id(weather_snowy_rainy_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "fog") {
            lv_obj_clear_flag(id(weather_fog_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "hail") {
            lv_obj_clear_flag(id(weather_hail_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "windy") {
            lv_obj_clear_flag(id(weather_windy_image), LV_OBJ_FLAG_HIDDEN);
          } else if (weather == "windy-variant") {
            lv_obj_clear_flag(id(weather_windy_variant_image), LV_OBJ_FLAG_HIDDEN);
          }

  - id: cal_update_all
    then:
      - lambda: |-
          auto fmt_time = [](const std::string &s) -> std::string {
            if (s.empty() || s.find('T') == std::string::npos) return "";
            struct tm t = {};
            if (strptime(s.c_str(), "%Y-%m-%dT%H:%M:%S%z", &t) == nullptr)
              strptime(s.c_str(), "%Y-%m-%dT%H:%M:%S", &t);
            char buf[9];
            strftime(buf, sizeof(buf), "%I:%M%p", &t);
            return std::string(buf);
          };
          auto fmt_date = [](const std::string &s) -> std::string {
            if (s.empty()) return "";
            struct tm t = {};
            if (strptime(s.c_str(), "%Y-%m-%dT%H:%M:%S%z", &t) == nullptr)
              if (strptime(s.c_str(), "%Y-%m-%dT%H:%M:%S", &t) == nullptr)
                if (strptime(s.c_str(), "%Y-%m-%d", &t) == nullptr)
                  return s.substr(0, std::min((int)s.size(), 10));
            char buf[12];
            strftime(buf, sizeof(buf), "%b %d", &t);
            return std::string(buf);
          };
          struct CalEvent { std::string title, start, end_t; };
          std::vector<CalEvent> events = {
            { id(cal_title_1).state, id(cal_start_1).state, id(cal_end_1).state },
            { id(cal_title_2).state, id(cal_start_2).state, id(cal_end_2).state },
            { id(cal_title_3).state, id(cal_start_3).state, id(cal_end_3).state },
          };
          lv_obj_t* dt_labels[] = {
            id(cal_datetime_label_1), id(cal_datetime_label_2),
            id(cal_datetime_label_3)
          };
          lv_obj_t* title_labels[] = {
            id(cal_title_label_1), id(cal_title_label_2),
            id(cal_title_label_3)
          };
          for (int i = 0; i < 3; i++) {
            const auto &ev = events[i];
            std::string date_str = fmt_date(ev.start);
            std::string t_start  = fmt_time(ev.start);
            std::string t_end    = fmt_time(ev.end_t);
            char buf[64];
            if (t_start.empty()) {
              snprintf(buf, sizeof(buf), "%s  all day", date_str.c_str());
            } else {
              snprintf(buf, sizeof(buf), "%s  %s-%s", date_str.c_str(), t_start.c_str(), t_end.c_str());
            }
            lv_label_set_text(dt_labels[i], ev.start.empty() ? " " : buf);
            lv_label_set_text(title_labels[i], ev.title.empty() ? " " : ev.title.c_str());
          }

select:
  - platform: lvgl
    widget: language_dropdown
    id: weather_select_language
    on_value: 
      then:
        - lambda: |-
            ESP_LOGI("LANGUAGE", "Language changed, updating weather translations");
        - delay: 300ms
        - script.execute:
            id: weather_get_and_set_translated_state
            state_str: !lambda 'return id(weather_state_sensor).state;'
        - lambda: |-
            ESP_LOGI("LANGUAGE", "Weather translations updated");

