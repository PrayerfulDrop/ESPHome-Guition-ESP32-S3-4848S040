substitutions:

  # fan_icons.ttf glyphs
  ceiling_fan_icon: "\U0000E901"   # ceiling-fan  (U+E901)
  floor_fan_icon:   "\U0000E900"   # floor-fan    (U+E900)

  # Per-slot icon defaults – use named icons from fans_config.yaml, e.g.:
  #   fan_icon_1:      "ceiling_fan"
  #   fan_icon_font_1: "${ceiling_fan_font}"
  # Named icons and their fonts are defined in fans_config.yaml substitutions.
  fan_icon_1:      "\U0000E901"
  fan_icon_font_1: "fan_icons_90"
  fan_icon_2:      "\U0000E901"
  fan_icon_font_2: "fan_icons_90"
  fan_icon_3:      "\U0000E901"
  fan_icon_font_3: "fan_icons_90"
  fan_icon_4:      "\U0000E900"
  fan_icon_font_4: "fan_icons_90"
  fan_icon_5:      "\U0000E900"
  fan_icon_font_5: "fan_icons_90"
  fan_icon_6:      "\U0000E900"
  fan_icon_font_6: "fan_icons_90"

  # Sentinel – leave unused slots as "sensor.disabled" in main2.yaml and
  # this file will hide those buttons automatically on boot.
  fan_entity_1: "sensor.disabled"
  fan_entity_2: "sensor.disabled"
  fan_entity_3: "sensor.disabled"
  fan_entity_4: "sensor.disabled"
  fan_entity_5: "sensor.disabled"
  fan_entity_6: "sensor.disabled"

  fan_label_name_1: ""
  fan_label_name_2: ""
  fan_label_name_3: ""
  fan_label_name_4: ""
  fan_label_name_5: ""
  fan_label_name_6: ""

  fan_widget_name_1: "fan1"
  fan_widget_name_2: "fan2"
  fan_widget_name_3: "fan3"
  fan_widget_name_4: "fan4"
  fan_widget_name_5: "fan5"
  fan_widget_name_6: "fan6"

  fan_type_1: "fan"
  fan_type_2: "fan"
  fan_type_3: "fan"
  fan_type_4: "fan"
  fan_type_5: "fan"
  fan_type_6: "fan"

# ── Grid layout ─────────────────────────────────────────────────────────────
# Row 1 (y=20):  slot1 x=20  slot2 x=170  slot3 x=320
# Row 2 (y=200): slot4 x=20  slot5 x=170  slot6 x=320
# Unused slots are hidden at boot – they leave a visual gap.
# To avoid gaps, define your fans in order (1→6) and only leave
# trailing slots as "sensor.disabled".

lvgl:
  pages:
    - id: fans_group_page
      bg_color: color_slate_blue_gray
      on_load:
        - lvgl.widget.show: menu_controls_main
      widgets:

        # ── Back button – returns to devices_page and restores nav bar ────
        - button:
            id: fans_panel_exit_btn
            x: 20
            y: 400
            width: 60
            height: 60
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  align: CENTER
                  text_font: icons_28
                  text_color: color_misty_blue
                  text: "\U0000e902"
            on_press:
              - lvgl.page.show:
                  id: home_page
                  animation: OUT_RIGHT
                  time: 300ms
              - lvgl.widget.show: menu_controls_main

        # ── Slot 1 ──────────────────────────────────────────────────────────
        - button:
            id: ${fan_widget_name_1}_btn
            x: 20
            y: 20
            width: 140
            height: 150
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${fan_widget_name_1}_fan_on
                  align: CENTER
                  text_color: color_steel_blue
                  text_font: ${${fan_icon_font_1}}
                  text: "${${fan_icon_1}}"
              - label:
                  id: ${fan_widget_name_1}_label_name
                  align: TOP_MID
                  y: 8
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "${fan_label_name_1}"

