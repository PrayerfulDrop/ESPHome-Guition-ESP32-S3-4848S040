# ── Hide unused slots at boot ───────────────────────────────────────────────
# ESPHome substitutions are compile-time string replacements, so the entity
# strings are baked into the binary. This lambda reads those baked-in strings
# at runtime and hides any slot whose entity resolved to "sensor.disabled".
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          struct SlotInfo {
            const char* entity;
            lv_obj_t*   btn;
          };

          SlotInfo slots[] = {
            { "${fan_entity_1}", id(${fan_widget_name_1}_btn) },
            { "${fan_entity_2}", id(${fan_widget_name_2}_btn) },
            { "${fan_entity_3}", id(${fan_widget_name_3}_btn) },
            { "${fan_entity_4}", id(${fan_widget_name_4}_btn) },
            { "${fan_entity_5}", id(${fan_widget_name_5}_btn) },
            { "${fan_entity_6}", id(${fan_widget_name_6}_btn) },
          };

          for (auto& slot : slots) {
            if (std::string(slot.entity) == "sensor.disabled") {
              lv_obj_add_flag(slot.btn, LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(slot.btn, LV_OBJ_FLAG_CLICKABLE);
            }
          }


# ── Binary sensors – short-press = toggle, long-press = speed page ─────────
# Hidden / non-clickable buttons never fire events, so all 6 handlers are
# safe to compile in regardless of how many fans are actually defined.
binary_sensor:
  - platform: lvgl
    id: ${fan_widget_name_1}_btn_sensor
    widget: ${fan_widget_name_1}_btn
    on_click:
    - min_length: 50ms
      max_length: 500ms
      then:
        - homeassistant.service:
            service: ${fan_type_1}.toggle
            data:
              entity_id: "${fan_entity_1}"
    - min_length: 800ms
      max_length: 3000ms
      then:
        - lvgl.widget.hide: menu_controls_main
        - lvgl.page.show:
            id: ${fan_widget_name_1}_fan_detail_page
            animation: OUT_RIGHT
            time: 300ms

  - platform: lvgl
    id: ${fan_widget_name_2}_btn_sensor
