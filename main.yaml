substitutions:
  # esphome info
  esphome_name:           "yourdisplayname"
  esphome_friendly_name:  "Your Display Name"
  ha_server:              "http://homeassistant.local:8123"  #ip address of HomeAssistant

  # entity information
  weather_entity:         "weather.forecast" #current outdoor weather/forecast
  temperature_entity:     "sensor.yourinternaltemperature" #indoor temperature entity
  humidity_entity:        "sensor.yourinternalhumidity" #indoor humidity entity
  co2_entity:             "sensor.yourinternalco2" #indoor CO2 entity
 
  vacuum_entity:          "vacuum.yourvacuum" # vacuum entity
  media_player_entity:    "media_player.yourmediaplayer" # media player entity
  alarm_panel_entity:     "alarm_control_panel.system" # alarm panel entity
  pin_code:               !secret security_pin_code # alarm panel security pin code for alarm panel (if used)

