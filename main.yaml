# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  GUITION ESP32-S3-4848S040  ·  Smart Home Display                           ║
# ║                                                                              ║
# ║  ► This is the ONLY file you need to edit.                                   ║
# ║    Copy / rename it to support multiple unique devices.                      ║
# ║                                                                              ║
# ║  Everything below the substitutions block is the widget engine — leave it    ║
# ║  unchanged unless you know what you are doing.                               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝


substitutions:
  # ── 1 │ DEVICE ───────────────────────────────────────────────────────────────
  # esphome_name : lowercase letters, numbers and hyphens only (used as hostname)
  # ha_server    : full URL to your Home Assistant instance
  # time_zone    : IANA timezone name — https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  #                Examples: America/New_York  America/Chicago  America/Denver  America/Los_Angeles
  #                          Europe/London  Europe/Paris  Asia/Tokyo  Australia/Sydney
  #
  esphome_name:          "yourdisplayname"
  esphome_friendly_name: "Your Display Name"
  ha_server:             "http://homeassistant.local:8123"
  time_zone:             "America/New_York" 


  # ── 2 │ CORE ENTITIES ────────────────────────────────────────────────────────
  # Notification banner — set this to an input_text entity in HA.
  # Write any text to it and a banner will appear on the display for 10 seconds.
  # Clear the entity (empty string) to dismiss early.
  notification_entity: "input_text.display_notification"

  weather_entity:      "weather.forecast"               # outdoor weather + forecast
  temperature_entity:  "sensor.yourinternaltemperature" # indoor temperature sensor
  vacuum_entity:       "vacuum.yourvacuum"              # robot vacuum entity
  media_player_entity: "media_player.yourmediaplayer"   # Spotify / music player
  alarm_panel_entity:  "alarm_control_panel.system"     # security / alarm panel
  pin_code:            !secret security_pin_code         # alarm PIN  (set in secrets.yaml)


  # ── 3 │ PERSON / PRESENCE  (up to 4 slots) ───────────────────────────────────
  #  Shows initials in the top indicators bar — green when home, dim when away.
  #  Unused slots → set person_entity_N: "sensor.disabled"
  #
  person_entity_1: "person.yourname"
  person_initials_1: "A"

  person_entity_2: "sensor.disabled"
  person_initials_2: ""

  person_entity_3: "sensor.disabled"
  person_initials_3: ""

  person_entity_4: "sensor.disabled"
  person_initials_4: ""


  # ── 4 │ SCENE SHORTCUTS  (up to 6 slots) ─────────────────────────────────────
  #  scene_type_N : scene | script | automation
  #  Unused slots → set scene_entity_N: "sensor.disabled"
  #
  scene_entity_1:  "scene.morning"
  scene_label_1:   "Morning"
  scene_type_1:    "scene"

  scene_entity_2:  "scene.evening"
  scene_label_2:   "Evening"
  scene_type_2:    "scene"

  scene_entity_3:  "scene.movie_night"
  scene_label_3:   "Movie Night"
  scene_type_3:    "scene"

  scene_entity_4:  "scene.good_night"
  scene_label_4:   "Good Night"
  scene_type_4:    "scene"

  scene_entity_5:  "sensor.disabled"
  scene_label_5:   ""
  scene_type_5:    "scene"

  scene_entity_6:  "sensor.disabled"
  scene_label_6:   ""
  scene_type_6:    "scene"


  # ── 4 │ CALENDAR  (up to 4 upcoming events) ──────────────────────────────────
  # Requires template sensors in Home Assistant.
  # See configuration.yaml in this project for ready-to-paste HA templates.
  calendar_entity:   "sensor.calendar_upcoming_event_1"
  calendar_entity_2: "sensor.calendar_upcoming_event_2"
  calendar_entity_3: "sensor.calendar_upcoming_event_3"
  calendar_entity_4: "sensor.calendar_upcoming_event_4"


  # ── 4 │ HVAC ─────────────────────────────────────────────────────────────────
  #
  #  Pick ONE configuration.  Set the entity/entities below, then uncomment the
  #  matching packages in the ENGINE block further down this file.
  #
  # ── Option 1: Combined HVAC  (heating + cooling via HA entity) ── DEFAULT ────
  hvac_entity: "climate.hvac"
  hvac_icon:   "\U0000e925"
  #
  # ── Option 2: Thermostat only  (heating) ─────────────────────────────────────
  # thermostat_entity: "climate.upstairs_heat"
  # hvac_icon:         "\U0000e925"
  #
  # ── Option 3: Air conditioner only  (cooling) ────────────────────────────────
  # air_conditioner_entity: "climate.downstairs_cool"
  # hvac_icon:              "\U0000e93b"
  #
  # ── Option 4: Thermostat + Air conditioner  (separate units) ─────────────────
  # thermostat_entity:      "climate.upstairs_heat"
  # air_conditioner_entity: "climate.downstairs_cool"
  # thermostat_page_id:     "thermostat_page"
  # ac_page_id:             "ac_page"
  # hvac_page_ref:          "id(thermostat_page)->obj, id(ac_page)->obj"


  # ── 5 │ LIGHTS  (up to 6 slots) ──────────────────────────────────────────────
  #
  #  light_type  : light | switch | input_boolean
  #  light_icon  : ceiling_lamp | ceiling_lamp_variant | night_lamp | lightbulb
  #                spotlights_group | desk_lamp | pendant_lamp
  #                bed | heart | tv
  #
  #  Unused slots → set light_entity_N: "sensor.disabled"
  #
  light_entity_1:     "light.yourmainlight"
  light_label_name_1: "Main Lights"
  light_type_1:       "light"
  light_icon_1:       "ceiling_lamp"

  light_entity_2:     "light.yourlamps"
  light_label_name_2: "Lamps"
  light_type_2:       "light"
  light_icon_2:       "night_lamp"

  light_entity_3:     "light.yournightlight"
  light_label_name_3: "Night Light"
  light_type_3:       "switch"
  light_icon_3:       "night_lamp"

  light_entity_4:     "input_boolean.yourbedtime"
  light_label_name_4: "Bedtime"
  light_type_4:       "input_boolean"
  light_icon_4:       "bed"

  light_entity_5:     "sensor.disabled"
  light_label_name_5: ""
  light_type_5:       ""
  light_icon_5:       ""

  light_entity_6:     "sensor.disabled"
  light_label_name_6: ""
  light_type_6:       ""
  light_icon_6:       ""


  # ── 6 │ FANS  (up to 6 slots) ────────────────────────────────────────────────
  #
  #  fan_type  : fan | switch | input_boolean
  #  fan_icon  : ceiling_fan | floor_fan  (or any icon from the light library)
  #
  #  Unused slots → set fan_entity_N: "sensor.disabled"
  #
  fan_entity_1:     "fan.yourceilingfan"
  fan_label_name_1: "Ceiling Fan"
  fan_type_1:       "fan"
  fan_icon_1:       "ceiling_fan"

  fan_entity_2:     "fan.yourfloorfan"
  fan_label_name_2: "Fan"
  fan_type_2:       "fan"
  fan_icon_2:       "floor_fan"

  fan_entity_3:     "sensor.disabled"
  fan_label_name_3: ""
  fan_type_3:       ""
  fan_icon_3:       ""

  fan_entity_4:     "sensor.disabled"
  fan_label_name_4: ""
  fan_type_4:       ""
  fan_icon_4:       ""

  fan_entity_5:     "sensor.disabled"
  fan_label_name_5: ""
  fan_type_5:       ""
  fan_icon_5:       ""

  fan_entity_6:     "sensor.disabled"
  fan_label_name_6: ""
  fan_type_6:       ""
  fan_icon_6:       ""


  # ── 7 │ COVERS  (up to 6 slots) ──────────────────────────────────────────────
  #
  #  Supports any HA cover entity: blinds, roller shutters, curtains, garage doors.
  #  The detail page shows a position bar, Open/Stop/Close buttons, and a position
  #  slider.  Position is 0 (closed) → 100 (fully open).
  #
  #  Unused slots → set cover_entity_N: "sensor.disabled"
  #
  cover_entity_1:     "sensor.disabled"
  cover_label_name_1: ""

  cover_entity_2:     "sensor.disabled"
  cover_label_name_2: ""

  cover_entity_3:     "sensor.disabled"
  cover_label_name_3: ""

  cover_entity_4:     "sensor.disabled"
  cover_label_name_4: ""

  cover_entity_5:     "sensor.disabled"
  cover_label_name_5: ""

  cover_entity_6:     "sensor.disabled"
  cover_label_name_6: ""


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  ENGINE  —  Do not edit below unless you know what you are doing.           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

packages:

  # ── Widget engine ─────────────────────────────────────────────────────────────
  home:               !include Guition-ESP32/widgets/home/home.yaml
  lights_config:      !include Guition-ESP32/widgets/light/lights_config.yaml
  fans_config:        !include Guition-ESP32/widgets/fan/fans_config.yaml
  shortcuts:          !include Guition-ESP32/widgets/shortcuts/shortcuts.yaml
  covers_config:      !include Guition-ESP32/widgets/cover/covers_config.yaml
  settings:           !include Guition-ESP32/widgets/settings/settings.yaml
  menu_controls_main: !include Guition-ESP32/widgets/menu_controls_main.yaml
  loading_page:       !include Guition-ESP32/widgets/loading_page.yaml

  # ── HVAC + Devices layout — activate ONE block to match Section 4 above ───────
  #
  # Option 1 (DEFAULT): Combined HVAC from Home Assistant
  devices: !include Guition-ESP32/widgets/devices.yaml
  hvac:    !include Guition-ESP32/widgets/hvac/hvac_widget.yaml
  #
  # Option 2: Thermostat only
  # devices: !include Guition-ESP32/widgets/devices.yaml
  # hvac:    !include Guition-ESP32/widgets/hvac/thermostat_widget.yaml
  #
  # Option 3: Air conditioner only
  # devices: !include Guition-ESP32/widgets/devices.yaml
  # hvac:    !include Guition-ESP32/widgets/hvac/air_conditioner_widget.yaml
  #
  # Option 4: Thermostat + Air conditioner  (two separate units)
  # devices:      !include Guition-ESP32/widgets/hvac/devices_thermostat_ac.yaml
  # thermostat:   !include Guition-ESP32/widgets/hvac/thermostat_widget.yaml
  # ac:           !include Guition-ESP32/widgets/hvac/air_conditioner_widget.yaml


image: !include Guition-ESP32/widgets/image.yaml
font:  !include Guition-ESP32/widgets/fonts.yaml
color: !include Guition-ESP32/widgets/colors.yaml


http_request:
  verify_ssl: false


esphome:
  name: "${esphome_name}"
  friendly_name: "${esphome_friendly_name}"
  includes:
    - <sstream>
    - <algorithm>
    - <ctime>
  platformio_options:
    board_build.flash_mode: dio


esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      # CONFIG_SPIRAM_RODATA intentionally omitted — mapping rodata into PSRAM
      # breaks LCD DMA transfers on ESP32-S3 (esp_lcd_panel_draw_bitmap invalid handle)
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_NEWLIB_NANO_FORMAT: "y"
      # CONFIG_LCD_RGB_RESTART_IN_VSYNC intentionally omitted — causes screen flickering
      # on the Guition ESP32-S3-4848S040 RGB LCD panel


psram:
  mode: octal
  speed: 80MHz


logger:
  level: WARN


api:


ota:
  - platform: esphome
    password: !secret display_ota
    on_begin:
      - lvgl.widget.show: ota_widget
      - lvgl.label.update:
          id: ota_label_primary
          text: "Starting OTA..."
      - lvgl.label.update:
          id: ota_label_secondary
          text: "Please wait"
      - lvgl.bar.update:
          id: ota_bar_value
          value: 0
    on_progress:
      - lvgl.label.update:
          id: ota_label_primary
          text: "Updating firmware"
      - lvgl.label.update:
          id: ota_label_secondary
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%d%%", (int)x);
            return buf;
      - lvgl.bar.update:
          id: ota_bar_value
          value: !lambda return (int)x;
    on_end:
      - lvgl.label.update:
          id: ota_label_primary
          text: "Update complete!"
      - lvgl.label.update:
          id: ota_label_secondary
          text: "Rebooting..."
      - lvgl.bar.update:
          id: ota_bar_value
          value: 100
    on_error:
      - lvgl.label.update:
          id: ota_label_primary
          text: "OTA Failed"
      - lvgl.label.update:
          id: ota_label_secondary
          text: "Check logs"
      - lvgl.widget.hide: ota_widget

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password


lvgl:
  color_depth: 16
  byte_order: big_endian
  displays: my_display
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 5000ms
      long_press_repeat_time: 400ms
  page_wrap: false
  top_layer:
    widgets:
      - obj:
          id: ota_widget
          hidden: true
          width: 480
          height: 480
          align: center
          clickable: false
          bg_color: color_slate_blue_gray
          border_opa: TRANSP
          shadow_opa: TRANSP
          radius: 0
          widgets:
            - label:
                id: ota_label_primary
                y: -50
                align: center
                text_font: nunito_20
                text_color: color_misty_blue
                text: "Starting OTA!"
            - label:
                id: ota_label_secondary
                y: -20
                align: center
                text_font: nunito_18
                text_color: color_misty_blue
                text: "Wait..."
            - bar:
                id: ota_bar_value
                y: 20
                width: 300
                value: 0
                align: center
                min_value: 0
                max_value: 100
                animated: true
                bg_color: color_steel_blue
                indicator:
                  bg_color: color_misty_blue

      # ── Screensaver overlay ────────────────────────────────────────────────
      - obj:
          id: screensaver_widget
          hidden: true
          width: 480
          height: 480
          align: center
          clickable: true
          bg_color: "0x080810"
          border_opa: TRANSP
          shadow_opa: TRANSP
          radius: 0
          widgets:
            - label:
                id: screensaver_time
                y: -30
                align: center
                text_font: nunito_44
                text_color: color_misty_blue
                text: "--:--"
            - label:
                id: screensaver_date
                y: 40
                align: center
                text_font: nunito_20
                text_color: color_steel_blue
                text: " "
          on_press:
            - globals.set:
                id: screensaver_active
                value: 'false'
            - lvgl.widget.hide: screensaver_widget
            - light.turn_on:
                id: display_backlight
                brightness: 100%

      # ── Notification banner ────────────────────────────────────────────────
      - obj:
          id: notification_banner
          hidden: true
          x: 20
          y: -100
          width: 440
          height: 70
          align: BOTTOM_MID
          bg_color: color_steel_blue
          border_color: color_misty_blue
          border_width: 1
          border_opa: 60%
          shadow_opa: TRANSP
          radius: 12
          widgets:
            - label:
                id: notification_text
                x: 15
                y: 0
                width: 380
                align: LEFT_MID
                text_font: nunito_20
                text_color: color_misty_blue
                long_mode: SCROLL_CIRCULAR
                text: " "


light:
  - platform: monochromatic
    output: GPIO38
    name: Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON


output:
  - platform: ledc
    pin: GPIO38
    id: GPIO38
    frequency: 100Hz


i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true
    frequency: 100kHz


touchscreen:
  platform: gt911
  id: my_touchscreen
  transform:
    mirror_x: false
    mirror_y: false
  display: my_display
  on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: st7701s
    id: my_display
    update_interval: never
    auto_clear_enabled: false
    data_rate: 2MHz
    spi_mode: MODE3
    color_order: RGB
    invert_colors: false
    dimensions:
      width: 480
      height: 480
    transform:
      mirror_x: false
      mirror_y: false
    cs_pin: 39
      # reset not defined
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10] # CMD2_BKSEL_BK0
      - [0xCD, 0x00] # disable MDT flag
    pclk_frequency: 12MHz
    pclk_inverted: false
    data_pins:
      red:
        - 11         # R1
        - 12         # R2
        - 13         # R3
        - 14         # R4
        - 0          # R5
      green:
        - 8          # G0
        - 20         # G1
        - 3          # G2
        - 46         # G3
        - 9          # G4
        - 10         # G5
      blue:
        - 4          # B1
        - 5          # B2
        - 6          # B3
        - 7          # B4
        - 15         # B5
