  calendar_entity:        "sensor.calendar_upcoming_event_1" #calendar event 1
  calendar_entity_2:      "sensor.calendar_upcoming_event_2" #calendar event 2
  calendar_entity_3:      "sensor.calendar_upcoming_event_3" #calendar event 3
  calendar_entity_4:      "sensor.calendar_upcoming_event_4" #calendar event 4


  # ── HVAC widget mode ──────────────────────────────────────────────────────
  # Choose which HVAC widget(s) appear in the Devices menu.
  # Step 1: Uncomment ONE of the options below (keep the others commented).
  # Step 2: In widgets/devices.yaml, uncomment the matching package include(s).
  #
  # ── OPTION 1: Combined HVAC — heating + cooling on one page (DEFAULT) ─────
  hvac_entity:            "climate.hvac" #hvac entity
  hvac_slot_1_icon:        "\U0000e925"   # thermostat-dial icon
  hvac_slot_1_page:        hvac_page
  hvac_slot_2_hidden:      "true"
  hvac_slot_2_icon:        "\U0000e925"   # placeholder (slot hidden)
  hvac_slot_2_page:        hvac_page      # placeholder (slot hidden)
  fans_btn_x:              "170"
