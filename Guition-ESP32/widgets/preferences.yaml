# preferences.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Central display-name preferences for all Guition ESP32-S3 display panels.
# Every human-readable label shown on screen is defined here so you can
# rename or translate any widget from one place without touching widget files.
#
# ── HOW TO USE ───────────────────────────────────────────────────────────────
# Add this file as the FIRST package in your main.yaml so its values take
# priority over the widget-file defaults:
#
#   packages:
#     preferences: !include widgets/preferences.yaml
#     # ... rest of your packages follow
#
# ── DEFAULTS ─────────────────────────────────────────────────────────────────
# Every key below is also defined as a default inside its widget file, so
# preferences.yaml is optional — widgets compile without it.  When included,
# the values here override the widget defaults.
#
# ── RUNTIME TRANSLATIONS ─────────────────────────────────────────────────────
# The script apply_ui_translations updates all always-present page titles and
# settings labels whenever the language dropdown changes.  HVAC widgets manage
# their own page title via their existing select: platform: lvgl hook.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:

  # ── Page titles ───────────────────────────────────────────────────────────────
  alarm_panel_page_title:  "Alarm Panel"
  covers_page_title:       "Covers"
  fans_page_title:         "Fan Controls"
  lights_page_title:       "Lights"
  hvac_page_title:         "HVAC"
  thermostat_page_title:   "Thermostat"
  ac_page_title:           "Air Conditioner"
  shortcuts_page_title:    "Scenes"
  people_page_title:       "People"
  forecast_page_title:     "5-Day Forecast"


  # ── Cover detail-page action buttons ─────────────────────────────────────────
  cover_open_label:  "Open"
  cover_stop_label:  "Stop"
  cover_close_label: "Close"


  # ── HVAC fan mode buttons ─────────────────────────────────────────────────────
  hvac_fan_auto_label: "Auto"
  hvac_fan_on_label:   "On"


  # ── Weather forecast page ─────────────────────────────────────────────────────
  forecast_today_label:   "Today"
  forecast_rain_label:    "Chance of Rain"
  forecast_refresh_label: "Refresh"


  # ── People page ───────────────────────────────────────────────────────────────
  # Default status text shown on each person card before HA state is received.
  person_away_label: "Away"


  # ── Alarm panel keypad ────────────────────────────────────────────────────────
  alarm_enter_code_label: "Enter Code"


  # ── Loading / boot screen ─────────────────────────────────────────────────────
  loading_connecting_label: "Connecting to API..."
  loading_sync_label:       "Synchronizing..."
  loading_connected_label:  "Home Assistant Connected!"


  # ── Settings page — section headings ─────────────────────────────────────────
  settings_language_label:    "Language"
  settings_theme_label:       "Theme"
  settings_backlight_label:   "Backlight"
  settings_sleep_label:       "Sleep Mode (sec)"
  settings_clock_label:       "Clock"
  settings_temperature_label: "Temperature"
  settings_screensaver_label: "Screensaver"
  settings_home_clock_label:  "Home Clock"


  # ── Settings page — button / option labels ────────────────────────────────────
  settings_clock_12h_label:           "12h"
  settings_clock_24h_label:           "24h"
  settings_screensaver_digital_label: "Digital"
  settings_flip_label:                "Flip"
  settings_screensaver_none_label:    "None"
  settings_home_clock_standard_label: "Standard"
  settings_show_calendar_label:       "Show Calendar Events"


# ── Runtime translation engine ────────────────────────────────────────────────
# apply_ui_translations updates every always-present label.
# Called automatically on boot and on every language dropdown change.
#
# Language index matches the settings page dropdown order:
#   0=de  1=es  2=fr  3=en-GB  4=it  5=pt  6=ru  7=en  8=pl
#
# String index → widget ID mapping:
#   0  alarm_panel_header        8  forecast_refresh_lbl      16 temp_unit_label
#   1  covers_panel_header       9  language_label            17 screensaver_style_label
#   2  fans_panel_header         10 theme_label               18 ss_digital_lbl
#   3  lights_panel_header       11 display_backlight_label   19 ss_analog_lbl
#   4  shortcuts_panel_header    12 display_timeout_label     20 ss_none_lbl
#   5  people_page_title_lbl     13 clock_format_label        21 ss_events_checkbox (checkbox)
#   6  forecast_title_lbl        14 clock_12h_label           22 home_clock_style_lbl
#   7  forecast_rain_lbl         15 clock_24h_label           23 home_std_lbl
#                                                             24 home_flip_lbl

