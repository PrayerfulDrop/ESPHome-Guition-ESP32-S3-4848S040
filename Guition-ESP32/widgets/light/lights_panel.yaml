# ── Grid layout ─────────────────────────────────────────────────────────────
# Row 1 (y=60):  slot1 x=20  slot2 x=170  slot3 x=320
# Row 2 (y=220): slot4 x=20  slot5 x=170  slot6 x=320
# 30px gap between rows, 30px buffer above nav bar. Fill slots in order (1→N).

lvgl:
  pages:
    - id: lights_group_page
      bg_color: color_slate_blue_gray
      widgets:

        # ── Page title ──────────────────────────────────────────────────────
        - label:
            id: lights_panel_header
            align: TOP_MID
            y: 20
            text_font: nunito_20
            text_color: color_misty_blue
            text: "${lights_page_title}"

        # ── Divider under title ──────────────────────────────────────────────
        - obj:
            align: TOP_MID
            y: 48
            width: 440
            height: 1
            pad_all: 0
            bg_color: color_misty_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 0

        # ── Slot 1 ──────────────────────────────────────────────────────────
        - button:
            id: ${light_widget_name_1}_btn
            x: 20
            y: 60
            width: 140
            height: 130
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${light_widget_name_1}_light_on
                  align: CENTER
                  text_color: color_steel_blue
                  text_font: ${${light_icon_font_1}}
                  text: "${${light_icon_1}}"
              - label:
                  id: ${light_widget_name_1}_lable_name
