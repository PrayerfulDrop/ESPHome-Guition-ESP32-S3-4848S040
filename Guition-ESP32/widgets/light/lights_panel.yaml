# ── Hide unused slots at boot ───────────────────────────────────────────────
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          struct SlotInfo {
            const char* entity;
            lv_obj_t*   btn;
          };

          SlotInfo slots[] = {
            { "${light_entity_1}", id(${light_widget_name_1}_btn) },
            { "${light_entity_2}", id(${light_widget_name_2}_btn) },
            { "${light_entity_3}", id(${light_widget_name_3}_btn) },
            { "${light_entity_4}", id(${light_widget_name_4}_btn) },
            { "${light_entity_5}", id(${light_widget_name_5}_btn) },
            { "${light_entity_6}", id(${light_widget_name_6}_btn) },
          };

          for (auto& slot : slots) {
            if (std::string(slot.entity) == "sensor.disabled") {
              lv_obj_add_flag(slot.btn, LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(slot.btn, LV_OBJ_FLAG_CLICKABLE);
            }
          }


# ── Binary sensors – short-press = toggle, long-press = detail page ─────────
# Hidden / non-clickable buttons never fire, so all 6 handlers compile safely
# regardless of how many lights are actually defined.
binary_sensor:
  - platform: lvgl
    id: ${light_widget_name_1}_btn_sensor
    widget: ${light_widget_name_1}_btn
    on_click:
    - min_length: 50ms
      max_length: 500ms
      then:
        - homeassistant.service:
            service: ${light_type_1}.toggle
            data:
              entity_id: "${light_entity_1}"
    - min_length: 800ms
      max_length: 3000ms
      then:
        - lvgl.widget.hide: menu_controls_main
        - lvgl.page.show:
            id: ${light_widget_name_1}_light_rgb_page
            animation: OUT_RIGHT
            time: 300ms

  - platform: lvgl
