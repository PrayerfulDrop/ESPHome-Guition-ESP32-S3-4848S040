substitutions:

  exit_icon: "\U0000e902"
  home_icon:  "\U0000e906"

  # Safe defaults – overridden per-slot by lights_config.yaml vars
  light_entity:  "sensor.disabled"
  light_type:    "light"       # "light" | "switch" | "input_boolean"
  light_icon:    "\U0000e918"  # ceiling_lamp_icon default; override per slot
  light_icon_font: "icons_90" # font that contains the light_icon glyph
  widget_name: "light_default"

# ── Globals ──────────────────────────────────────────────────────────────────
globals:
  - id: ${widget_name}_light_is_on
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_current_brightness
    type: float
    initial_value: '1.0'
  - id: ${widget_name}_updating_from_ha
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_ha_data_received
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_sensors_ready_count
    type: int
    initial_value: '0'
  # true  → entity is "sensor.disabled", slot is fully suppressed
  - id: ${widget_name}_is_disabled
    type: bool
    initial_value: 'false'
  # true  → light entity with brightness support
  # false → switch / input_boolean (on/off only)
  - id: ${widget_name}_has_brightness
    type: bool
    initial_value: 'false'

# ── Boot: resolve type and disabled flag ─────────────────────────────────────
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          // Disable slot entirely if entity is "sensor.disabled"
          if (std::string("${light_entity}") == "sensor.disabled") {
            id(${widget_name}_is_disabled) = true;
            return;
          }

          // Determine whether this slot has brightness control
          std::string t = "${light_type}";
          bool has_bright = (t == "light");
          id(${widget_name}_has_brightness) = has_bright;

          if (!has_bright) {
            // switch / input_boolean: hide the brightness slider panel
            lv_obj_add_flag(id(${widget_name}_light_rgb_bg_slider), LV_OBJ_FLAG_HIDDEN);
            // Expand the icon/lightbulb panel to full width
            lv_obj_set_width(id(${widget_name}_light_rgb_bg_lightbulb), 440);
            lv_obj_set_x(id(${widget_name}_light_rgb_bg_lightbulb), 0);
            lv_obj_set_align(id(${widget_name}_light_rgb_bg_lightbulb), LV_ALIGN_TOP_MID);
          }

# ── Brightness sensor (only meaningful for light entities) ───────────────────
# The filter silences the "Can't convert 'None' to number" warning that fires
# when a light is off and HA reports brightness as None.  NaN values are dropped
# before reaching on_value, so the log stays clean.
sensor:
  - platform: homeassistant
    id: ${widget_name}_light_rgb_sensor_brightness
    entity_id: "${light_entity}"
    attribute: brightness
    filters:
      - filter_out: nan
    on_value:
      - if:
          condition:
            lambda: 'return id(${widget_name}_is_disabled) || !id(${widget_name}_has_brightness);'
          then: []
          else:
            - if:
                condition:
                  lambda: 'return !std::isnan(x);'
                then:
                  - lambda: |-
                      static bool first = false;
                      if (!first) { first = true; id(${widget_name}_sensors_ready_count) += 1; }
                  - if:
                      condition:
                        lambda: 'return !id(${widget_name}_updating_from_ha);'
                      then:
                        - globals.set:
                            id: ${widget_name}_current_brightness
                            value: !lambda return x;
                        - lvgl.slider.update:
                            id: ${widget_name}_light_rgb_brightness_slider
                            value: !lambda return int(x);
                else:
                  - if:
                      condition:
                        lambda: 'return !id(${widget_name}_updating_from_ha);'
                      then:
                        - globals.set:
                            id: ${widget_name}_current_brightness
                            value: '0.0'
                        - lvgl.slider.update:
                            id: ${widget_name}_light_rgb_brightness_slider
                            value: 0
            - script.execute: ${widget_name}_check_all_data_ready

# ── State sensor (on/off for all types) ──────────────────────────────────────
text_sensor:
  - platform: homeassistant
    id: ${widget_name}_light_rgb_state
    entity_id: "${light_entity}"
    on_value:
      - if:
          condition:
            lambda: 'return id(${widget_name}_is_disabled);'
          then: []
          else:
            - lambda: |-
                bool is_on = (x == "on");
                id(${widget_name}_light_is_on) = is_on;
                static bool first = false;
                if (!first) { first = true; id(${widget_name}_sensors_ready_count) += 1; }

            # Update both the tile icon (lights_panel) and the detail page ring
            - if:
                condition:
                  lambda: 'return id(${widget_name}_light_is_on);'
                then:
                  # Tile icon colour
                  - lvgl.label.update:
                      id: ${widget_name}_light_on
                      text_color: color_amber
                  # Detail page power ring
                  - lvgl.button.update:
                      id: ${widget_name}_light_rgb_light_on
                      bg_color: color_amber
                      shadow_color: color_amber
                      shadow_opa: 100%
                else:
                  # Tile icon colour
                  - lvgl.label.update:
                      id: ${widget_name}_light_on
                      text_color: color_steel_blue
                  # Detail page power ring
                  - lvgl.button.update:
                      id: ${widget_name}_light_rgb_light_on
                      bg_color: color_white
                      shadow_opa: TRANSP

            # For state-only slots, count state as satisfying both ready sensors
            - lambda: |-
                if (!id(${widget_name}_has_brightness)) {
                  if (id(${widget_name}_sensors_ready_count) < 2) {
                    id(${widget_name}_sensors_ready_count) = 2;
                  }
                }
            - script.execute: ${widget_name}_check_all_data_ready

  - platform: homeassistant
    id: ${widget_name}_light_rgb_name
    entity_id: "${light_entity}"
    attribute: friendly_name
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(${widget_name}_is_disabled);'
            then:
              - lvgl.label.update:
                  id: ${widget_name}_light_rgb_lable_name
                  text: !lambda return x;

# ── Detail page ──────────────────────────────────────────────────────────────
lvgl:
  pages:
    - id: ${widget_name}_light_rgb_page
      bg_color: color_slate_blue_gray
      widgets:

        # Title bar
        - button:
            id: ${widget_name}_light_rgb_bg_name
            y: 20
            width: 440
            height: 40
            align: TOP_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_light_rgb_lable_name
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "lightbulb"

        # Left panel – power ring + light icon + tap-to-toggle overlay
        # Width/position adjusted at boot for switch/input_boolean slots
        - button:
            id: ${widget_name}_light_rgb_bg_lightbulb
            x: 20
            y: 80
            width: 200
            height: 280
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              # Power state indicator ring
              - button:
                  id: ${widget_name}_light_rgb_light_on
                  width: 70
                  height: 70
                  y: 74
                  align: TOP_MID
                  bg_color: color_white
                  shadow_color: color_white
                  shadow_ofs_y: -3
                  shadow_spread: 3
                  shadow_width: 15
                  radius: 40
              # Light icon
              - image:
                  y: 30
                  align: CENTER
                  src: lightbulb_image
                  id: ${widget_name}_lightbulb_image
              # Full-panel transparent overlay – toggles light using correct service
              - button:
                  id: ${widget_name}_light_rgb_light_on_btn
                  width: 200
                  height: 280
                  align: CENTER
                  bg_opa: TRANSP
                  shadow_opa: TRANSP
                  on_press:
                    - if:
                        condition:
                          lambda: 'return !id(${widget_name}_is_disabled) && id(${widget_name}_has_brightness);'
                        then:
                          - homeassistant.service:
                              service: light.toggle
                              data:
                                entity_id: "${light_entity}"
                    - if:
                        condition:
                          lambda: 'return !id(${widget_name}_is_disabled) && !id(${widget_name}_has_brightness);'
                        then:
                          - homeassistant.service:
                              service: ${light_type}.toggle
                              data:
                                entity_id: "${light_entity}"

        # Right panel – brightness slider
        # Hidden at boot for switch/input_boolean slots
        - obj:
            id: ${widget_name}_light_rgb_bg_slider
            x: -20
            y: 80
            width: 220
            height: 380
            align: TOP_RIGHT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 20
            widgets:
              - button:
                  id: ${widget_name}_light_rgb_brightness_gradient
                  radius: 20
                  width: 100
                  height: 300
                  align: CENTER
                  bg_color: color_slate_blue_gray
                  bg_opa: 100%
                  shadow_opa: TRANSP

              - slider:
                  id: ${widget_name}_light_rgb_brightness_slider
                  radius: 20
                  width: 100
                  height: 300
                  align: CENTER
                  bg_opa: TRANSP
                  min_value: 3
                  max_value: 255
                  indicator:
                    bg_color: color_amber
                    radius: 10
                  knob:
                    bg_opa: TRANSP
                  on_value:
                    - if:
                        condition:
                          lambda: >
                            return !id(${widget_name}_is_disabled)
                                && id(${widget_name}_has_brightness)
                                && !id(${widget_name}_updating_from_ha)
                                && id(${widget_name}_ha_data_received);
                        then:
                          - globals.set:
                              id: ${widget_name}_current_brightness
                              value: !lambda return x;
                          - if:
                              condition:
                                lambda: 'return !id(${widget_name}_light_is_on) && x > 3;'
                              then:
                                - homeassistant.service:
                                    service: light.turn_on
                                    data:
                                      entity_id: "${light_entity}"
                                      brightness: !lambda return int(x);
                  on_release:
                    - if:
                        condition:
                          lambda: >
                            return !id(${widget_name}_is_disabled)
                                && id(${widget_name}_has_brightness)
                                && id(${widget_name}_ha_data_received);
                        then:
                          - if:
                              condition:
                                lambda: 'return x <= 3;'
                              then:
                                - homeassistant.service:
                                    service: light.turn_off
                                    data:
                                      entity_id: "${light_entity}"
                              else:
                                - homeassistant.service:
                                    service: light.turn_on
                                    data:
                                      entity_id: "${light_entity}"
                                      brightness: !lambda return int(x);

        # Back button – returns to lights panel
        - button:
            id: ${widget_name}_light_rgb_exit_on_btn
            x: 20
            y: -20
            width: 200
            height: 80
            align: BOTTOM_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_light_rgb_exit_on_icon
                  align: CENTER
                  text_font: icons_28
                  text_color: color_misty_blue
                  text: "${exit_icon}"
            on_press:
              then:
                - lvgl.widget.show: menu_controls_main
                - lvgl.page.show:
                    id: lights_group_page
                    animation: OUT_RIGHT
                    time: 300ms

        # Home button – jumps directly to home page
        - button:
            id: ${widget_name}_light_rgb_home_btn
            x: -20
            y: -20
            width: 200
            height: 80
            align: BOTTOM_RIGHT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_light_rgb_home_icon
                  align: CENTER
                  text_font: icons_36
                  text_color: color_misty_blue
                  text: "${home_icon}"
            on_press:
              then:
                - lvgl.widget.show: menu_controls_main
                - lvgl.page.show:
                    id: home_page
                    animation: OUT_RIGHT
                    time: 300ms

# ── Scripts ──────────────────────────────────────────────────────────────────
script:
  - id: ${widget_name}_check_all_data_ready
    mode: restart
    then:
      - delay: 500ms
      - lambda: |-
          if (id(${widget_name}_sensors_ready_count) >= 2) {
            if (!id(${widget_name}_ha_data_received)) {
              id(${widget_name}_ha_data_received) = true;
              id(${widget_name}_updating_from_ha) = false;
            }
          }
