# icon_library.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Shared icon substitution library used by lights_config.yaml and fans_config.yaml.
# Each icon entry has two subs: the glyph codepoint and its matching font id.
#
# Usage in main.yaml — set only the icon name; the font resolves automatically:
#   light_icon_1: "ceiling_lamp"      → uses ${ceiling_lamp} and ${ceiling_lamp_font}
#   fan_icon_1:   "ceiling_fan"       → uses ${ceiling_fan} and ${ceiling_fan_font}
#
# To add a new icon: add both the codepoint and _font entries here, then reference
# by name in main.yaml.  Make sure the glyph is included in fonts.yaml.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:

  # ── icons_v2.ttf  (font id: icons_90) ────────────────────────────────────
  lightbulb:                 "\U0000e908"
  lightbulb_font:            "icons_90"
  spotlights_group:          "\U0000e915"
  spotlights_group_font:     "icons_90"
  desk_lamp:                 "\U0000e916"
  desk_lamp_font:            "icons_90"
  pendant_lamp:              "\U0000e917"
  pendant_lamp_font:         "icons_90"
  ceiling_lamp:              "\U0000e918"
  ceiling_lamp_font:         "icons_90"
  ceiling_lamp_variant:      "\U0000e921"
  ceiling_lamp_variant_font: "icons_90"
  night_lamp:                "\U0000e919"
  night_lamp_font:           "icons_90"
  music:                     "\U0000e91b"
  music_font:                "icons_90"
  vacuum_icon:               "\U0000e922"
  vacuum_icon_font:          "icons_90"
  curtains:                  "\U0000E945"
  curtains_font:             "icons_90"
  garage:                    "\U0000E946"
  garage_font:               "icons_90"
  movie_clapper:             "\U0000E947"
  movie_clapper_font:        "icons_90"

  # ── mdi.ttf  (font id: mdi_90) ───────────────────────────────────────────
  bed:                       "\U000f02e3"
  bed_font:                  "mdi_90"
  heart:                     "\U000F05F6"
  heart_font:                "mdi_90"
  tv:                        "\U000F07F4"
  tv_font:                   "mdi_90"

  # ── fan_icons.ttf  (font id: fan_icons_90) ───────────────────────────────
  ceiling_fan:               "\U0000E901"
  ceiling_fan_font:          "fan_icons_90"
  floor_fan:                 "\U0000E900"
