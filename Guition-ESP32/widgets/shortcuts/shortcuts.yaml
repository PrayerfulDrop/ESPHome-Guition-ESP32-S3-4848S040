# shortcuts.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Scene / script / automation shortcut grid (up to 6 tiles).
# Configure entities and labels in the Section 3 substitutions of main.yaml.
# Set scene_entity_N: "sensor.disabled" to hide unused slots.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  # Default: movie clapper from icons_v2.ttf.  To use MDI play-circle instead:
  #   scene_icon:      "\U000F0A62"
  #   scene_icon_font: "mdi_icons_40"
  scene_icon:      "\U0000E947"   # movie_clapper (icons_v2 / icons_48)
  scene_icon_font: "icons_48"

  # Safe defaults — overridden by main.yaml
  scene_entity_1: "sensor.disabled"
  scene_label_1:  ""
  scene_type_1:   "scene"
  scene_entity_2: "sensor.disabled"
  scene_label_2:  ""
  scene_type_2:   "scene"
  scene_entity_3: "sensor.disabled"
  scene_label_3:  ""
  scene_type_3:   "scene"
  scene_entity_4: "sensor.disabled"
  scene_label_4:  ""
  scene_type_4:   "scene"
  scene_entity_5: "sensor.disabled"
  scene_label_5:  ""
  scene_type_5:   "scene"
  scene_entity_6: "sensor.disabled"
  scene_label_6:  ""
  scene_type_6:   "scene"


lvgl:
  pages:
    - id: shortcuts_page
      bg_color: color_slate_blue_gray
      widgets:

        # ── Page title ──────────────────────────────────────────────────────
        - label:
            id: shortcuts_panel_header
            align: TOP_MID
            y: 20
            text_font: nunito_20
            text_color: color_misty_blue
            text: "Scenes"

        # ── Divider under title ──────────────────────────────────────────────
        - obj:
            align: TOP_MID
            y: 48
            width: 440
            height: 1
            pad_all: 0
            bg_color: color_misty_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 0

        # ── 2×3 tile grid ─────────────────────────────────────────────────────
        - obj:
            id: shortcuts_grid
            x: 20
            y: 60
            width: 440
            height: 320
            align: TOP_LEFT
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:

              # ── Row 1 ──────────────────────────────────────────────────────
              - button:
                  id: scene_btn_1
                  x: 10
                  y: 10
                  width: 130
                  height: 150
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        id: scene_icon_1
                        y: 12
                        align: TOP_MID
                        text_font: "${scene_icon_font}"
                        text_color: color_steel_blue
                        text: "${scene_icon}"
                    - label:
                        id: scene_label_lbl_1
                        y: -12
                        align: BOTTOM_MID
                        width: 120
                        text_font: nunito_18
                        text_color: color_misty_blue
                        long_mode: WRAP
                        text: "${scene_label_1}"
                  on_press:
                    - homeassistant.action:
                        action: "${scene_type_1}.turn_on"
                        data:
                          entity_id: "${scene_entity_1}"

              - button:
                  id: scene_btn_2
                  x: 155
                  y: 10
                  width: 130
                  height: 150
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        id: scene_icon_2
                        y: 12
                        align: TOP_MID
                        text_font: "${scene_icon_font}"
                        text_color: color_steel_blue
                        text: "${scene_icon}"
                    - label:
                        id: scene_label_lbl_2
                        y: -12
                        align: BOTTOM_MID
                        width: 120
                        text_font: nunito_18
                        text_color: color_misty_blue
                        long_mode: WRAP
                        text: "${scene_label_2}"
                  on_press:
                    - homeassistant.action:
                        action: "${scene_type_2}.turn_on"
                        data:
                          entity_id: "${scene_entity_2}"

              - button:
                  id: scene_btn_3
                  x: 300
                  y: 10
                  width: 130
                  height: 150
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        id: scene_icon_3
                        y: 12
                        align: TOP_MID
                        text_font: "${scene_icon_font}"
                        text_color: color_steel_blue
                        text: "${scene_icon}"
                    - label:
                        id: scene_label_lbl_3
                        y: -12
                        align: BOTTOM_MID
                        width: 120
                        text_font: nunito_18
                        text_color: color_misty_blue
                        long_mode: WRAP
                        text: "${scene_label_3}"
                  on_press:
                    - homeassistant.action:
                        action: "${scene_type_3}.turn_on"
                        data:
                          entity_id: "${scene_entity_3}"

              # ── Row 2 ──────────────────────────────────────────────────────
              - button:
                  id: scene_btn_4
                  x: 10
                  y: 175
                  width: 130
                  height: 150
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        id: scene_icon_4
                        y: 12
                        align: TOP_MID
                        text_font: "${scene_icon_font}"
                        text_color: color_steel_blue
                        text: "${scene_icon}"
                    - label:
                        id: scene_label_lbl_4
                        y: -12
                        align: BOTTOM_MID
                        width: 120
                        text_font: nunito_18
                        text_color: color_misty_blue
                        long_mode: WRAP
                        text: "${scene_label_4}"
                  on_press:
                    - homeassistant.action:
                        action: "${scene_type_4}.turn_on"
                        data:
                          entity_id: "${scene_entity_4}"

              - button:
                  id: scene_btn_5
                  x: 155
                  y: 175
                  width: 130
                  height: 150
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        id: scene_icon_5
                        y: 12
                        align: TOP_MID
                        text_font: "${scene_icon_font}"
                        text_color: color_steel_blue
                        text: "${scene_icon}"
                    - label:
                        id: scene_label_lbl_5
                        y: -12
                        align: BOTTOM_MID
                        width: 120
                        text_font: nunito_18
                        text_color: color_misty_blue
                        long_mode: WRAP
                        text: "${scene_label_5}"
                  on_press:
                    - homeassistant.action:
                        action: "${scene_type_5}.turn_on"
                        data:
                          entity_id: "${scene_entity_5}"

              - button:
                  id: scene_btn_6
                  x: 300
                  y: 175
                  width: 130
                  height: 150
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        id: scene_icon_6
                        y: 12
                        align: TOP_MID
                        text_font: "${scene_icon_font}"
                        text_color: color_steel_blue
                        text: "${scene_icon}"
                    - label:
                        id: scene_label_lbl_6
                        y: -12
                        align: BOTTOM_MID
                        width: 120
                        text_font: nunito_18
                        text_color: color_misty_blue
                        long_mode: WRAP
                        text: "${scene_label_6}"
                  on_press:
                    - homeassistant.action:
                        action: "${scene_type_6}.turn_on"
                        data:
                          entity_id: "${scene_entity_6}"


esphome:
  on_boot:
    priority: -300
    then:
      - lambda: |-
          // Hide disabled shortcut slots
          const char* entities[] = {
            "${scene_entity_1}", "${scene_entity_2}", "${scene_entity_3}",
            "${scene_entity_4}", "${scene_entity_5}", "${scene_entity_6}"
          };
          lv_obj_t* btns[] = {
            id(scene_btn_1), id(scene_btn_2), id(scene_btn_3),
            id(scene_btn_4), id(scene_btn_5), id(scene_btn_6),
          };
          for (int i = 0; i < 6; i++) {
            if (std::string(entities[i]) == "sensor.disabled") {
              lv_obj_add_flag(btns[i], LV_OBJ_FLAG_HIDDEN);
            }
          }
