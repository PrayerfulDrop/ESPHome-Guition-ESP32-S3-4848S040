substitutions:

  exit_icon: "\U0000e902"

  # Safe default – overridden by fans_config.yaml vars
  fan_entity:  "none"
  widget_name: "fan_default"

globals:
  - id: ${widget_name}_fan_is_on
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_current_speed
    type: float
    initial_value: '100.0'
  - id: ${widget_name}_updating_from_ha
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_ha_data_received
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_sensors_ready_count
    type: int
    initial_value: '0'
  # Set true when this slot's entity is "none" – suppresses all HA calls
  - id: ${widget_name}_is_disabled
    type: bool
    initial_value: 'false'

# ── Sensors ─────────────────────────────────────────────────────────────────
# When entity is "none" ESPHome will attempt to subscribe but HA simply won't
# return values, so on_value never fires.  The is_disabled guard below
# stops any accidental service call.
sensor:
  - platform: homeassistant
    id: ${widget_name}_fan_sensor_speed
    entity_id: "${fan_entity}"
    attribute: percentage
    on_value:
      - if:
          condition:
            lambda: 'return id(${widget_name}_is_disabled);'
          then: []
          else:
            - if:
                condition:
                  lambda: 'return !std::isnan(x);'
                then:
                  - lambda: |-
                      static bool first = false;
                      if (!first) { first = true; id(${widget_name}_sensors_ready_count) += 1; }
                  - if:
                      condition:
                        lambda: 'return !id(${widget_name}_updating_from_ha);'
                      then:
                        - globals.set:
                            id: ${widget_name}_current_speed
                            value: !lambda return x;
                        - lvgl.slider.update:
                            id: ${widget_name}_fan_speed_slider
                            value: !lambda return int(x);
                        - lvgl.label.update:
                            id: ${widget_name}_fan_speed_label
                            text: !lambda |-
                              char buf[8];
                              snprintf(buf, sizeof(buf), "%d%%", int(x));
                              return std::string(buf);
                else:
                  - if:
                      condition:
                        lambda: 'return !id(${widget_name}_updating_from_ha);'
                      then:
                        - globals.set:
                            id: ${widget_name}_current_speed
                            value: '0.0'
                        - lvgl.slider.update:
                            id: ${widget_name}_fan_speed_slider
                            value: 0
                        - lvgl.label.update:
                            id: ${widget_name}_fan_speed_label
                            text: "0%"
            - script.execute: ${widget_name}_check_all_data_ready

text_sensor:
  - platform: homeassistant
    id: ${widget_name}_fan_state_sensor
    entity_id: "${fan_entity}"
    on_value:
      - if:
          condition:
            lambda: 'return id(${widget_name}_is_disabled);'
          then: []
          else:
            - lambda: |-
                bool is_on = (x == "on");
                id(${widget_name}_fan_is_on) = is_on;
                static bool first = false;
                if (!first) { first = true; id(${widget_name}_sensors_ready_count) += 1; }
            - if:
                condition:
                  lambda: 'return id(${widget_name}_fan_is_on);'
                then:
                  - lvgl.button.update:
                      id: ${widget_name}_fan_power_btn
                      bg_color: color_sky_blue
                      shadow_color: color_sky_blue
                      shadow_opa: 100%
                  - lvgl.label.update:
                      id: ${widget_name}_fan_on
                      text_color: color_sky_blue
                  - lvgl.widget.show: ${widget_name}_fan_speed_area
                else:
                  - lvgl.button.update:
                      id: ${widget_name}_fan_power_btn
                      bg_color: color_white
                      shadow_opa: TRANSP
                  - lvgl.label.update:
                      id: ${widget_name}_fan_on
                      text_color: color_steel_blue
                  - lvgl.widget.hide: ${widget_name}_fan_speed_area
            - script.execute: ${widget_name}_check_all_data_ready

  - platform: homeassistant
    id: ${widget_name}_fan_friendly_name
    entity_id: "${fan_entity}"
    attribute: friendly_name
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(${widget_name}_is_disabled);'
            then:
              - lvgl.label.update:
                  id: ${widget_name}_fan_label_name
                  text: !lambda return x;

# ── Boot: mark disabled if entity is "none" ──────────────────────────────────
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          if (std::string("${fan_entity}") == "none") {
            id(${widget_name}_is_disabled) = true;
          }

# ── Detail page ──────────────────────────────────────────────────────────────
lvgl:
  pages:
    - id: ${widget_name}_fan_speed_page
      bg_color: color_slate_blue_gray
      widgets:

        # Title bar
        - button:
            id: ${widget_name}_fan_bg_name
            y: 20
            width: 440
            height: 40
            align: TOP_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_fan_label_name
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Fan"

        # Left panel – power indicator + fan icon + toggle overlay
        - button:
            id: ${widget_name}_fan_bg_icon
            x: 20
            y: 80
            width: 200
            height: 280
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - button:
                  id: ${widget_name}_fan_power_btn
                  width: 70
                  height: 70
                  y: 74
                  align: TOP_MID
                  bg_color: color_white
                  shadow_color: color_white
                  shadow_ofs_y: -3
                  shadow_spread: 3
                  shadow_width: 15
                  radius: 40
              - label:
                  id: ${widget_name}_fan_on
                  y: 20
                  align: CENTER
                  text_color: color_steel_blue
                  text_font: icons_72
                  text: "\U0000e926"
              # Transparent tap overlay – toggles the fan
              - button:
                  id: ${widget_name}_fan_toggle_btn
                  width: 200
                  height: 280
                  align: CENTER
                  bg_opa: TRANSP
                  shadow_opa: TRANSP
                  on_press:
                    - if:
                        condition:
                          lambda: 'return !id(${widget_name}_is_disabled);'
                        then:
                          - homeassistant.service:
                              service: fan.toggle
                              data:
                                entity_id: "${fan_entity}"

        # Right panel – speed slider
        - obj:
            id: ${widget_name}_fan_bg_slider
            x: -20
            y: 80
            width: 220
            height: 380
            align: TOP_RIGHT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 20
            widgets:
              - label:
                  id: ${widget_name}_fan_speed_label
                  y: 20
                  align: TOP_MID
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "100%"

              # Speed slider group – hidden when fan is off
              - obj:
                  id: ${widget_name}_fan_speed_area
                  width: 180
                  height: 280
                  align: CENTER
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  shadow_opa: TRANSP
                  widgets:
                    - button:
                        id: ${widget_name}_fan_speed_track
                        radius: 20
                        width: 100
                        height: 280
                        align: CENTER
                        bg_color: color_slate_blue_gray
                        bg_opa: 100%
                        shadow_opa: TRANSP
                    - slider:
                        id: ${widget_name}_fan_speed_slider
                        radius: 20
                        width: 100
                        height: 280
                        align: CENTER
                        bg_opa: TRANSP
                        min_value: 1
                        max_value: 100
                        value: 100
                        indicator:
                          bg_color: color_sky_blue
                          radius: 10
                        knob:
                          bg_opa: TRANSP
                        on_value:
                          - if:
                              condition:
                                lambda: >
                                  return !id(${widget_name}_is_disabled)
                                      && !id(${widget_name}_updating_from_ha)
                                      && id(${widget_name}_ha_data_received);
                              then:
                                - globals.set:
                                    id: ${widget_name}_current_speed
                                    value: !lambda return x;
                                - lvgl.label.update:
                                    id: ${widget_name}_fan_speed_label
                                    text: !lambda |-
                                      char buf[8];
                                      snprintf(buf, sizeof(buf), "%d%%", int(x));
                                      return std::string(buf);
                                - if:
                                    condition:
                                      lambda: 'return !id(${widget_name}_fan_is_on) && x > 1;'
                                    then:
                                      - homeassistant.service:
                                          service: fan.turn_on
                                          data:
                                            entity_id: "${fan_entity}"
                                            percentage: !lambda return int(x);
                        on_release:
                          - if:
                              condition:
                                lambda: >
                                  return !id(${widget_name}_is_disabled)
                                      && id(${widget_name}_ha_data_received);
                              then:
                                - if:
                                    condition:
                                      lambda: 'return x <= 1;'
                                    then:
                                      - homeassistant.service:
                                          service: fan.turn_off
                                          data:
                                            entity_id: "${fan_entity}"
                                    else:
                                      - homeassistant.service:
                                          service: fan.turn_on
                                          data:
                                            entity_id: "${fan_entity}"
                                            percentage: !lambda return int(x);

        # Back button
        - button:
            id: ${widget_name}_fan_exit_btn
            x: 20
            y: -20
            width: 200
            height: 80
            align: BOTTOM_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_fan_exit_icon
                  align: CENTER
                  text_font: icons_28
                  text_color: color_misty_blue
                  text: "${exit_icon}"
            on_press:
              then:
                - lvgl.widget.show: menu_controls_main
                - lvgl.page.show:
                    id: fans_group_page
                    animation: OUT_RIGHT
                    time: 300ms

script:
  - id: ${widget_name}_check_all_data_ready
    mode: restart
    then:
      - delay: 500ms
      - lambda: |-
          if (id(${widget_name}_sensors_ready_count) >= 2) {
            if (!id(${widget_name}_ha_data_received)) {
              id(${widget_name}_ha_data_received) = true;
              id(${widget_name}_updating_from_ha) = false;
            }
          }
