substitutions:

  exit_icon: "\U0000e902"

  # fan_icons.ttf glyphs
  ceiling_fan_icon: "\U0000E901"   # ceiling-fan
  floor_fan_icon:   "\U0000E900"   # floor-fan / exhaust

  # Safe defaults – overridden per-slot by fans_config.yaml vars
  fan_entity:  "sensor.disabled"
  fan_type:    "fan"       # "fan" | "switch" | "input_boolean"
  fan_icon:      "ceiling_fan"    # icon name from icon_library; override per slot
  fan_icon_font: "ceiling_fan_font" # resolves to mdi_icons_90 via icon_library
  widget_name:   "fan_default"

# ── Globals ──────────────────────────────────────────────────────────────────
globals:
  - id: ${widget_name}_fan_is_on
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_current_speed
    type: float
    initial_value: '100.0'
  - id: ${widget_name}_updating_from_ha
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_ha_data_received
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_sensors_ready_count
    type: int
    initial_value: '0'
  # true  → entity is "sensor.disabled", slot is fully suppressed
  - id: ${widget_name}_is_disabled
    type: bool
    initial_value: 'false'
  # true  → fan entity with percentage speed support
  # false → switch / input_boolean (on/off only)
  - id: ${widget_name}_has_speed
    type: bool
    initial_value: 'false'

# ── Boot: resolve type and disabled flag ─────────────────────────────────────
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          // Disable slot entirely if entity is "sensor.disabled"
          if (std::string("${fan_entity}") == "sensor.disabled") {
            id(${widget_name}_is_disabled) = true;
            return;
          }

          // Determine whether this slot supports speed control
          std::string t = "${fan_type}";
          bool speed = (t == "fan");
          id(${widget_name}_has_speed) = speed;

          if (!speed) {
            // Switch / input_boolean: hide the speed slider panel entirely
            lv_obj_add_flag(id(${widget_name}_fan_bg_slider), LV_OBJ_FLAG_HIDDEN);
            // Expand the icon panel to fill the full width
            lv_obj_set_width(id(${widget_name}_fan_bg_icon), 440);
            lv_obj_set_x(id(${widget_name}_fan_bg_icon), 0);
            lv_obj_set_align(id(${widget_name}_fan_bg_icon), LV_ALIGN_TOP_MID);
          }

          // Set the detail page icon to match the compiled-in fan_icon substitution.
          // The substitution is already baked into the label text at compile time,
          // so no runtime change is needed here – the correct glyph is already set.

# ── Speed sensor (only meaningful for fan entities) ──────────────────────────
# filter_out: nan silences "Can't convert 'None' to number" when fan is off.
sensor:
  - platform: homeassistant
    id: ${widget_name}_fan_sensor_speed
    entity_id: "${fan_entity}"
    attribute: percentage
    filters:
      - filter_out: nan
    on_value:
      - if:
          condition:
            lambda: 'return id(${widget_name}_is_disabled) || !id(${widget_name}_has_speed);'
          then: []
          else:
            - if:
                condition:
                  lambda: 'return !std::isnan(x);'
                then:
                  - lambda: |-
                      static bool first = false;
                      if (!first) { first = true; id(${widget_name}_sensors_ready_count) += 1; }
                  - if:
                      condition:
                        lambda: 'return !id(${widget_name}_updating_from_ha);'
                      then:
                        - globals.set:
                            id: ${widget_name}_current_speed
                            value: !lambda return x;
                        - lvgl.slider.update:
                            id: ${widget_name}_fan_speed_slider
                            value: !lambda return int(x);
                        - lvgl.label.update:
                            id: ${widget_name}_fan_speed_label
                            text: !lambda |-
                              char buf[8];
                              snprintf(buf, sizeof(buf), "%d%%", int(x));
                              return std::string(buf);
                else:
                  - if:
                      condition:
                        lambda: 'return !id(${widget_name}_updating_from_ha);'
                      then:
                        - globals.set:
                            id: ${widget_name}_current_speed
                            value: '0.0'
                        - lvgl.slider.update:
                            id: ${widget_name}_fan_speed_slider
                            value: 0
                        - lvgl.label.update:
                            id: ${widget_name}_fan_speed_label
                            text: "0%"
            - script.execute: ${widget_name}_check_all_data_ready

# ── State sensor (on/off for all types) ──────────────────────────────────────
text_sensor:
  - platform: homeassistant
    id: ${widget_name}_fan_state_sensor
    entity_id: "${fan_entity}"
    on_value:
      - if:
          condition:
            lambda: 'return id(${widget_name}_is_disabled);'
          then: []
          else:
            - lambda: |-
                bool is_on = (x == "on");
                id(${widget_name}_fan_is_on) = is_on;
                static bool first = false;
                if (!first) { first = true; id(${widget_name}_sensors_ready_count) += 1; }

            # Update both the tile icon (fans_panel) and the detail page icon
            - if:
                condition:
                  lambda: 'return id(${widget_name}_fan_is_on);'
                then:
                  # Tile icon colour
                  - lvgl.label.update:
                      id: ${widget_name}_fan_on
                      text_color: color_sky_blue
                  # Detail page: power ring + icon colour
                  - lvgl.button.update:
                      id: ${widget_name}_fan_power_btn
                      bg_color: color_sky_blue
                      shadow_color: color_sky_blue
                      shadow_opa: 100%
                  - lvgl.label.update:
                      id: ${widget_name}_fan_detail_icon
                      text_color: color_sky_blue
                  # Only show speed area when type supports it
                  - lambda: |-
                      if (id(${widget_name}_has_speed)) {
                        lv_obj_clear_flag(id(${widget_name}_fan_speed_area), LV_OBJ_FLAG_HIDDEN);
                      }
                else:
                  # Tile icon colour
                  - lvgl.label.update:
                      id: ${widget_name}_fan_on
                      text_color: color_steel_blue
                  # Detail page: power ring + icon colour
                  - lvgl.button.update:
                      id: ${widget_name}_fan_power_btn
                      bg_color: color_white
                      shadow_opa: TRANSP
                  - lvgl.label.update:
                      id: ${widget_name}_fan_detail_icon
                      text_color: color_steel_blue
                  - lvgl.widget.hide: ${widget_name}_fan_speed_area

            # For state-only slots count state as the sole ready sensor
            - lambda: |-
                if (!id(${widget_name}_has_speed)) {
                  if (id(${widget_name}_sensors_ready_count) < 2) {
                    id(${widget_name}_sensors_ready_count) = 2;
                  }
                }
            - script.execute: ${widget_name}_check_all_data_ready

  - platform: homeassistant
    id: ${widget_name}_fan_friendly_name
    entity_id: "${fan_entity}"
    attribute: friendly_name
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(${widget_name}_is_disabled);'
            then:
              - lvgl.label.update:
                  id: ${widget_name}_fan_label_name
                  text: !lambda return x;

# ── Detail page ──────────────────────────────────────────────────────────────
lvgl:
  pages:
    - id: ${widget_name}_fan_detail_page
      bg_color: color_slate_blue_gray
      widgets:

        # Title bar
        - button:
            id: ${widget_name}_fan_bg_name
            y: 20
            width: 440
            height: 40
            align: TOP_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_fan_label_name
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Fan"
                

        # Left panel – power indicator ring + fan icon + tap-to-toggle overlay
        # Width/position are adjusted at boot for switch slots (no slider panel)
        - button:
            id: ${widget_name}_fan_bg_icon
            x: 20
            y: 80
            width: 200
            height: 280
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - button:
                  id: ${widget_name}_fan_power_btn
                  width: 70
                  height: 70
                  y: 74
                  align: TOP_MID
                  bg_color: color_white
                  shadow_color: color_white
                  shadow_ofs_y: -3
                  shadow_spread: 3
                  shadow_width: 15
                  radius: 40
              - label:
                  id: ${widget_name}_fan_detail_icon
                  y: 20
                  align: CENTER
                  text_color: color_steel_blue
                  text_font: ${${fan_icon_font}}
                  text: "${${fan_icon}}"
              # Full-panel transparent tap overlay – calls correct service by type
              - button:
                  id: ${widget_name}_fan_toggle_btn
                  width: 200
                  height: 280
                  align: CENTER
                  bg_opa: TRANSP
                  shadow_opa: TRANSP
                  on_press:
                    - if:
                        condition:
                          lambda: 'return !id(${widget_name}_is_disabled) && id(${widget_name}_has_speed);'
                        then:
                          - homeassistant.service:
                              service: fan.toggle
                              data:
                                entity_id: "${fan_entity}"
                    - if:
                        condition:
                          lambda: 'return !id(${widget_name}_is_disabled) && !id(${widget_name}_has_speed);'
                        then:
                          - homeassistant.service:
                              service: ${fan_type}.toggle
                              data:
                                entity_id: "${fan_entity}"

        # Right panel – speed slider (hidden at boot for switch/input_boolean slots)
        - obj:
            id: ${widget_name}_fan_bg_slider
            x: -20
            y: 80
            width: 220
            height: 380
            align: TOP_RIGHT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 20
            widgets:
              - label:
                  id: ${widget_name}_fan_speed_label
                  y: 20
                  align: TOP_MID
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "100%"

              # Speed slider group – also hidden when fan is off
              - obj:
                  id: ${widget_name}_fan_speed_area
                  width: 180
                  height: 280
                  align: CENTER
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  shadow_opa: TRANSP
                  widgets:
                    - button:
                        id: ${widget_name}_fan_speed_track
                        radius: 20
                        width: 100
                        height: 280
                        align: CENTER
                        bg_color: color_slate_blue_gray
                        bg_opa: 100%
                        shadow_opa: TRANSP
                    - slider:
                        id: ${widget_name}_fan_speed_slider
                        radius: 20
                        width: 100
                        height: 280
                        align: CENTER
                        bg_opa: TRANSP
                        min_value: 1
                        max_value: 100
                        value: 100
                        indicator:
                          bg_color: color_sky_blue
                          radius: 10
                        knob:
                          bg_opa: TRANSP
                        on_value:
                          - if:
                              condition:
                                lambda: >
                                  return !id(${widget_name}_is_disabled)
                                      && id(${widget_name}_has_speed)
                                      && !id(${widget_name}_updating_from_ha)
                                      && id(${widget_name}_ha_data_received);
                              then:
                                - globals.set:
                                    id: ${widget_name}_current_speed
                                    value: !lambda return x;
                                - lvgl.label.update:
                                    id: ${widget_name}_fan_speed_label
                                    text: !lambda |-
                                      char buf[8];
                                      snprintf(buf, sizeof(buf), "%d%%", int(x));
                                      return std::string(buf);
                                - if:
                                    condition:
                                      lambda: 'return !id(${widget_name}_fan_is_on) && x > 1;'
                                    then:
                                      - homeassistant.service:
                                          service: fan.turn_on
                                          data:
                                            entity_id: "${fan_entity}"
                                            percentage: !lambda return int(x);
                        on_release:
                          - if:
                              condition:
                                lambda: >
                                  return !id(${widget_name}_is_disabled)
                                      && id(${widget_name}_has_speed)
                                      && id(${widget_name}_ha_data_received);
                              then:
                                - if:
                                    condition:
                                      lambda: 'return x <= 1;'
                                    then:
                                      - homeassistant.service:
                                          service: fan.turn_off
                                          data:
                                            entity_id: "${fan_entity}"
                                    else:
                                      - homeassistant.service:
                                          service: fan.turn_on
                                          data:
                                            entity_id: "${fan_entity}"
                                            percentage: !lambda return int(x);

        # Back button – returns to fans panel and restores nav bar
        - button:
            id: ${widget_name}_fan_exit_btn
            x: 20
            y: 400
            width: 60
            height: 60
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_fan_exit_icon
                  align: CENTER
                  text_font: icons_28
                  text_color: color_misty_blue
                  text: "${exit_icon}"
            on_press:
              - lvgl.widget.show: menu_controls_main
              - lvgl.page.show: fans_group_page


# ── Scripts ──────────────────────────────────────────────────────────────────
script:
  - id: ${widget_name}_check_all_data_ready
    mode: restart
    then:
      - delay: 500ms
      - lambda: |-
          if (id(${widget_name}_sensors_ready_count) >= 2) {
            if (!id(${widget_name}_ha_data_received)) {
              id(${widget_name}_ha_data_received) = true;
              id(${widget_name}_updating_from_ha) = false;
            }
          }
