# devices.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Devices page — navigation hub for Alarm, Media Player, Vacuum, HVAC, Fans.
#
# The HVAC package is NOT included here.  It is included directly in main.yaml
# so the user can choose between hvac_widget, thermostat_widget, or
# air_conditioner_widget with a single commented/uncommented line.
#
# All three HVAC widgets use the page id "hvac_page", so the button below
# always navigates to the correct page regardless of which widget is active.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  music_icon:     "\U0000e91b"    # music note  (icons_72)
  vacuum_icon:    "\U0000e922"    # vacuum      (icons_72)

  # ── Shortcuts / Scenes nav button icon ────────────────────────────────────
  # Default: movie clapper from icons_v2.ttf.  To use MDI play-circle instead:
  #   shortcuts_icon:      "\U000F0A62"
  #   shortcuts_icon_font: "mdi_icons_72"
  shortcuts_icon:      "\U0000E947"    # movie_clapper  (icons_v2 / icons_72)
  shortcuts_icon_font: "icons_72"

  # ── Covers nav button icon ─────────────────────────────────────────────────
  # Default: curtains.  Other options (set both subs together):
  #   Garage:     covers_icon: "\U0000E946"  covers_icon_font: "icons_72"
  #   MDI blinds: covers_icon: "\U000F012F"  covers_icon_font: "mdi_icons_72"
  covers_icon:      "\U0000E945"    # curtains  (icons_v2 / icons_72)
  covers_icon_font: "icons_72"

  # hvac_icon is defined in main.yaml — set it to match your HVAC type:
  #   "\U0000e925"  thermostat / combined HVAC
  #   "\U0000e93b"  air conditioner only


packages:
  media_player: !include media_player/media_player.yaml
  vacuum:       !include vacuum/vacuum_widget.yaml
  alarm_panel:  !include alarm_panel/alarm_panel.yaml


lvgl:
  pages:
    - id: devices_page
      bg_color: color_slate_blue_gray
      widgets:
        - obj:
            id: devices_main
            y: 20
            width: 440
            height: 348
            pad_all: 0
            align: TOP_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            border_opa: TRANSP
            border_width: 0
            radius: 10
            widgets:

              # ── Row 1: Alarm · Media Player · Vacuum ─────────────────────
              # y=12: 12px top margin. Buttons at x=35/170/305 give equal 35px
              # horizontal margins and gaps. Rows spaced 112px apart (100px
              # button + 12px gap) for even vertical distribution.
              - button:
                  id: alarm_panel_page_btn
                  x: 35
                  y: 12
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: mdi_icons_72
                        text: "${shield_away_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: alarm_panel_page
                        animation: OUT_RIGHT
                        time: 300ms

              - button:
                  id: media_player_page_btn
                  x: 170
                  y: 12
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: icons_90
                        text: "${music_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: media_player_page
                        animation: OUT_RIGHT
                        time: 300ms

              - button:
                  id: vacuum_page_btn
                  x: 305
                  y: 12
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: icons_72
                        text: "${vacuum_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: vacuum_page
                        animation: OUT_RIGHT
                        time: 300ms

              # ── Row 2: HVAC · Fans · Shortcuts ───────────────────────────
              # hvac_icon is set in main.yaml to match your HVAC system type.
              # All three HVAC widget options use page id "hvac_page".
              - button:
                  id: hvac_btn
                  x: 35
                  y: 124
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: icons_72
                        text: "${hvac_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: hvac_page
                        animation: OUT_RIGHT
                        time: 300ms

              - button:
                  id: fans_page_btn
                  x: 170
                  y: 124
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: fan_icons_72
                        text: "\U0000E901"    # ceiling-fan
                  on_press:
                    - lvgl.page.show:
                        id: fans_group_page
                        animation: OUT_RIGHT
                        time: 300ms

              - button:
                  id: shortcuts_page_btn
                  x: 305
                  y: 124
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: "${shortcuts_icon_font}"
                        text: "${shortcuts_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: shortcuts_page
                        animation: OUT_RIGHT
                        time: 300ms

              # ── Row 3: Covers ─────────────────────────────────────────────
              - button:
                  id: covers_page_btn
                  x: 35
                  y: 236
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: "${covers_icon_font}"
                        text: "${covers_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: covers_group_page
                        animation: OUT_RIGHT
                        time: 300ms
