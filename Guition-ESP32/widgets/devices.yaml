# devices.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Devices page — navigation hub for Alarm, Media Player, Vacuum, HVAC, Fans.
#
# The HVAC package is NOT included here.  It is included directly in main.yaml
# so the user can choose between hvac_widget, thermostat_widget, or
# air_conditioner_widget with a single commented/uncommented line.
#
# All three HVAC widgets use the page id "hvac_page", so the button below
# always navigates to the correct page regardless of which widget is active.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  music_icon:   "\U0000e91b"    # music note  (icons_v2 / icons_90)
  vacuum_icon:  "\U0000e922"    # vacuum      (icons_v2 / icons_72)

  # ── Shortcuts / Scenes nav button icon ────────────────────────────────────
  # Set shortcuts_icon to any name from the icon library (icon_library.yaml).
  # Common options:  movie  |  movie_clapper  |  play_circle
  # The matching font is resolved automatically.
  shortcuts_icon:      "movie"
  shortcuts_icon_font: "movie_font"

  # ── Covers nav button icon ─────────────────────────────────────────────────
  # Set covers_icon to any name from the icon library.
  # Common options:  curtains  |  garage  |  blinds
  # The matching font is resolved automatically.
  covers_icon:      "curtains"
  covers_icon_font: "curtains_font"

  # hvac_icon is defined in main.yaml — set it to match your HVAC type:
  #   "\U0000e925"  thermostat / combined HVAC
  #   "\U0000e93b"  air conditioner only


packages:
  icon_library: !include icon_library.yaml
  media_player: !include media_player/media_player.yaml
  vacuum:       !include vacuum/vacuum_widget.yaml
  alarm_panel:  !include alarm_panel/alarm_panel.yaml


lvgl:
  pages:
    - id: devices_page
      bg_color: color_slate_blue_gray
      widgets:
        - obj:
            id: devices_main
            y: 20
            width: 440
            height: 348
            pad_all: 0
            align: TOP_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            border_opa: TRANSP
            border_width: 0
            radius: 10
            widgets:

              # ── Row 1: Alarm · Media Player · Vacuum ─────────────────────
              # y=12: 12px top margin. Buttons at x=35/170/305 give equal 35px
              # horizontal margins and gaps. Rows spaced 112px apart (100px
              # button + 12px gap) for even vertical distribution.
              - button:
                  id: alarm_panel_page_btn
                  x: 35
                  y: 12
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: mdi_icons_72
                        text: "${shield_away_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: alarm_panel_page
                        animation: OUT_RIGHT
                        time: 300ms

              - button:
                  id: media_player_page_btn
                  x: 170
                  y: 12
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: icons_90
                        text: "${music_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: media_player_page
                        animation: OUT_RIGHT
                        time: 300ms

              - button:
                  id: vacuum_page_btn
                  x: 305
                  y: 12
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: icons_72
                        text: "${vacuum_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: vacuum_page
                        animation: OUT_RIGHT
                        time: 300ms

              # ── Row 2: HVAC · Fans · Shortcuts ───────────────────────────
              # hvac_icon is set in main.yaml to match your HVAC system type.
              # All three HVAC widget options use page id "hvac_page".
              - button:
                  id: hvac_btn
                  x: 35
                  y: 124
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: icons_72
                        text: "${hvac_icon}"
                  on_press:
                    - lvgl.page.show:
                        id: hvac_page
                        animation: OUT_RIGHT
                        time: 300ms

              - button:
                  id: fans_page_btn
                  x: 170
                  y: 124
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: mdi_icons_72
                        text: "\U000F0CF4"    # mdi:ceiling-fan
                  on_press:
                    - lvgl.page.show:
                        id: fans_group_page
                        animation: OUT_RIGHT
                        time: 300ms

              - button:
                  id: shortcuts_page_btn
                  x: 305
                  y: 124
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: ${${shortcuts_icon_font}}
                        text: "${${shortcuts_icon}}"
                  on_press:
                    - lvgl.page.show:
                        id: shortcuts_page
                        animation: OUT_RIGHT
                        time: 300ms

              # ── Row 3: Covers ─────────────────────────────────────────────
              - button:
                  id: covers_page_btn
                  x: 35
                  y: 236
                  align: TOP_LEFT
                  width: 100
                  height: 100
                  radius: 10
                  bg_color: color_slate_blue_gray
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        align: CENTER
                        text_color: color_steel_blue
                        text_font: ${${covers_icon_font}}
                        text: "${${covers_icon}}"
                  on_press:
                    - lvgl.page.show:
                        id: covers_group_page
                        animation: OUT_RIGHT
                        time: 300ms


# ── Compact layout: remove gaps left by disabled optional buttons ─────────────
# Runs after fans (-200), shortcuts (-300), and covers (-200) have hidden
# themselves, so all visibility flags are already final.
# Optional buttons (fans, shortcuts, covers) are repacked left-to-right into
# slots (170,124) → (305,124) → (35,236).  The container shrinks to 2 rows
# when all optional items fit in row 2 (i.e. ≤2 of them are visible).
esphome:
  on_boot:
    priority: -400
    then:
      - lambda: |-
          lv_obj_t* opt_btns[] = {
            id(fans_page_btn),
            id(shortcuts_page_btn),
            id(covers_page_btn),
          };

          // Slots available for optional items after the 4 fixed buttons
          struct Pos { lv_coord_t x; lv_coord_t y; };
          static const Pos slots[] = {
            {170, 124},
            {305, 124},
            { 35, 236},
          };

          int n = 0;
          for (auto* btn : opt_btns) {
            if (!lv_obj_has_flag(btn, LV_OBJ_FLAG_HIDDEN)) {
              lv_obj_align(btn, LV_ALIGN_TOP_LEFT, slots[n].x, slots[n].y);
              n++;
            }
          }

          // Shrink the container when row 3 is not needed
          lv_obj_set_height(id(devices_main), (n == 3) ? 348 : 236);
