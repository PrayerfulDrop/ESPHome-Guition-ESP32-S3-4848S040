substitutions:
  hvac_name:              "hvac"
  temperature_sensor:     "temperature_sensor"
  heating_icon:           "\U0000e936"
  air_conditioner_icon:   "\U0000e93b"
  temperature_icon:       "\U0000e939"
  power_icon:             "\U0000e909"
  exit_icon:              "\U0000e902"


sensor:

  - platform: homeassistant
    id: hvac_sensor_target_temp
    entity_id: "${hvac_entity}"
    attribute: temperature
    on_value:
      then:
        - lvgl.arc.update:
            id: hvac_arc_main
            value: !lambda return x;
        - lvgl.label.update:
            id: hvac_target_temperature_whole
            text: !lambda |-
              static char buf[10];
              int whole_part = static_cast<int>(id(hvac_sensor_target_temp).state);
              snprintf(buf, 10, "%d", whole_part);
              return buf;
        - lvgl.label.update:
            id: hvac_target_temperature_fraction
            text: !lambda |-
              static char buf[10];
              int whole_part = static_cast<int>(id(hvac_sensor_target_temp).state);
              int fractional_part = static_cast<int>((id(hvac_sensor_target_temp).state - whole_part) * 10);
              snprintf(buf, 10, ".%01d", fractional_part);
              return buf;

  - platform: homeassistant
    id: hvac_sensor_current_temp
    entity_id: "${hvac_entity}"
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: hvac_target_temperature_value
          text: !lambda |-
            char buf[8];
            sprintf(buf, "%.1f", x);
            return std::string(buf);
      - lvgl.arc.update:
          id: hvac_arc_current_temp
          value: !lambda return x;


text_sensor:

  - platform: homeassistant
    id: hvac_sensor_name
    entity_id: "${hvac_entity}"
    attribute: friendly_name
    on_value:
      - lvgl.label.update:
          id: hvac_name_label
          text: !lambda return x;

  - platform: homeassistant
    id: hvac_sensor_hvac_action
    entity_id: "${hvac_entity}"
    attribute: hvac_action
    on_value:
      - script.execute:
          id: hvac_get_and_set_translated_state
          state_str: !lambda 'return id(hvac_sensor_hvac_action).state;'
      - if:
          condition:
            lambda: 'return id(hvac_sensor_hvac_action).state == "heating";'
          then:
            - lvgl.label.update:
                id: hvac_status
                text_color: color_deep_orange
          else:
            - if:
                condition:
                  lambda: 'return id(hvac_sensor_hvac_action).state == "cooling";'
                then:
                  - lvgl.label.update:
                      id: hvac_status
                      text_color: color_sky_blue
                else:
                  - lvgl.label.update:
                      id: hvac_status
                      text_color: color_steel_blue

  - platform: homeassistant
    id: hvac_sensor_state
    entity_id: "${hvac_entity}"
    on_value:
      - lambda: |-
          std::string state = id(hvac_sensor_state).state;
          const lv_style_selector_t sel = static_cast<lv_style_selector_t>((uint32_t)LV_PART_MAIN | (uint32_t)LV_STATE_DEFAULT);

          if (state == "heat") {
            lv_obj_set_style_bg_opa(id(hvac_mode_heat_btn), LV_OPA_60, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(hvac_mode_cool_btn), LV_OPA_20, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(hvac_mode_off_btn),  LV_OPA_20, LV_PART_MAIN);
            lv_label_set_text(id(hvac_state_icon), "${heating_icon}");
            // arc background: yellow (low/cool) → red (high/hot), bottom to top
            lv_obj_set_style_bg_color(id(hvac_temp_arc_bg),      lv_color_hex(0xFF2000), sel);
            lv_obj_set_style_bg_grad_color(id(hvac_temp_arc_bg), lv_color_hex(0xFFD700), sel);
            lv_obj_set_style_bg_grad_dir(id(hvac_temp_arc_bg),   LV_GRAD_DIR_VER,        sel);
          } else if (state == "cool") {
            lv_obj_set_style_bg_opa(id(hvac_mode_heat_btn), LV_OPA_20, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(hvac_mode_cool_btn), LV_OPA_60, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(hvac_mode_off_btn),  LV_OPA_20, LV_PART_MAIN);
            lv_label_set_text(id(hvac_state_icon), "${air_conditioner_icon}");
            // arc background: light-blue (high/warm) → dark-blue (low/cold), top to bottom
            lv_obj_set_style_bg_color(id(hvac_temp_arc_bg),      lv_color_hex(0x87CEEB), sel);
            lv_obj_set_style_bg_grad_color(id(hvac_temp_arc_bg), lv_color_hex(0x0047AB), sel);
            lv_obj_set_style_bg_grad_dir(id(hvac_temp_arc_bg),   LV_GRAD_DIR_VER,        sel);
          } else {
            lv_obj_set_style_bg_opa(id(hvac_mode_heat_btn), LV_OPA_20, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(hvac_mode_cool_btn), LV_OPA_20, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(hvac_mode_off_btn),  LV_OPA_60, LV_PART_MAIN);
            lv_label_set_text(id(hvac_state_icon), "${power_icon}");
            // arc background: gray gradient
            lv_obj_set_style_bg_color(id(hvac_temp_arc_bg),      lv_color_hex(0x607080), sel);
            lv_obj_set_style_bg_grad_color(id(hvac_temp_arc_bg), lv_color_hex(0x303848), sel);
            lv_obj_set_style_bg_grad_dir(id(hvac_temp_arc_bg),   LV_GRAD_DIR_VER,        sel);
          }


lvgl:

  pages:
    - id: hvac_page
      bg_color: color_slate_blue_gray
      widgets:

        # State bar
        - obj:
            id: hvac_state_bar
            x: 20
            y: 20
            width: 400
            height: 60
            align: TOP_LEFT
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: hvac_state_label
                  x: 20
                  align: LEFT_MID
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: " "

        # Mode buttons — HEAT / COOL / OFF
        - obj:
            id: hvac_mode_panel
            x: 15
            y: 100
            width: 210
            height: 90
            align: TOP_LEFT
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:

              - obj:
                  id: hvac_mode_heat_btn
                  x: 10
                  align: LEFT_MID
                  width: 60
                  height: 60
                  radius: 30
                  pad_all: 0
                  bg_color: color_deep_orange
                  bg_opa: 20%
                  shadow_opa: TRANSP
                  border_opa: TRANSP
                  border_width: 0
                  clickable: true
                  widgets:
                    - label:
                        align: CENTER
                        text_font: icons_36
                        text_color: color_deep_orange
                        text: "${heating_icon}"
                  on_click:
                    - homeassistant.action:
                        action: climate.set_hvac_mode
                        data:
                          entity_id: "${hvac_entity}"
                          hvac_mode: heat

              - obj:
                  id: hvac_mode_cool_btn
                  x: 80
                  align: LEFT_MID
                  width: 60
                  height: 60
                  radius: 30
                  pad_all: 0
                  bg_color: color_sky_blue
                  bg_opa: 20%
                  shadow_opa: TRANSP
                  border_opa: TRANSP
                  border_width: 0
                  clickable: true
                  widgets:
                    - label:
                        align: CENTER
                        text_font: icons_36
                        text_color: color_sky_blue
                        text: "${air_conditioner_icon}"
                  on_click:
                    - homeassistant.action:
                        action: climate.set_hvac_mode
                        data:
                          entity_id: "${hvac_entity}"
                          hvac_mode: cool

              - obj:
                  id: hvac_mode_off_btn
                  x: 150
                  align: LEFT_MID
                  width: 60
                  height: 60
                  radius: 30
                  pad_all: 0
                  bg_color: color_misty_blue
                  bg_opa: 20%
                  shadow_opa: TRANSP
                  border_opa: TRANSP
                  border_width: 0
                  clickable: true
                  widgets:
                    - label:
                        align: CENTER
                        text_font: icons_36
                        text_color: color_misty_blue
                        text: "${power_icon}"
                  on_click:
                    - homeassistant.action:
                        action: climate.set_hvac_mode
                        data:
                          entity_id: "${hvac_entity}"
                          hvac_mode: "off"

        # Back button – returns to devices page
        - button:
            id: hvac_back_btn
            x: 20
            y: -20
            width: 200
            height: 80
            align: BOTTOM_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  align: CENTER
                  text_font: icons_28
                  text_color: color_misty_blue
                  text: "${exit_icon}"
            on_press:
              then:
                - lvgl.widget.show: menu_controls_main
                - lvgl.page.show:
                    id: devices_page
                    animation: OUT_RIGHT
                    time: 300ms

        # Hidden label – keeps sensor update target valid
        - label:
            id: hvac_name_label
            hidden: true
            text: ""
            text_font: nunito_16

        # Arc / meter section
        - obj:
            id: hvac_bg_main
            width: 250
            height: 480
            align: RIGHT_MID
            pad_all: 0
            bg_opa: TRANSP
            scrollable: false
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:

              - obj:
                  id: hvac_bg_placeholder
                  radius: 240
                  x: 235
                  width: 480
                  height: 480
                  align: RIGHT_MID
                  bg_color: color_slate_blue_gray
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP

              - obj:
                  id: hvac_temp_arc_bg
                  radius: 230
                  x: 230
                  width: 460
                  height: 460
                  align: RIGHT_MID
                  bg_color: 0x607080
                  bg_grad_color: 0x303848
                  bg_grad_dir: VER
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP

              - meter:
                  id: hvac_meter
                  x: 200
                  height: 400
                  width: 400
                  border_width: 0
                  bg_color: color_slate_blue_gray
                  align: RIGHT_MID
                  text_color: color_steel_blue
                  scales:
                    - range_from: 50
                      range_to: 90
                      angle_range: 160
                      rotation: 100.0
                      ticks:
                        width: 1
                        count: 21
                        length: 10
                        color: color_white
                        major:
                          stride: 5
                          width: 5
                          length: 15
                          color: color_white
                          label_gap: 15
                      indicators:
                        - tick_style:
                            start_value: 10
                            end_value: 30
                            color_start: color_yellow
                            color_end: color_red
                            width: 1

              - arc:
                  id: hvac_arc_main
                  align: RIGHT_MID
                  arc_width: 40
                  x: 235
                  width: 470
                  height: 470
                  min_value: 50
                  max_value: 90
                  adjustable: true
                  adv_hittest: true
                  rotation: 90.0
                  start_angle: 10
                  end_angle: 170
                  arc_opa: TRANSP
                  indicator:
                    arc_opa: TRANSP
                    arc_width: 40
                  knob:
                    border_color: color_misty_blue
                    border_width: 7
                    bg_color: color_dark_gray
                    bg_opa: 80%
                  on_release:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: "${hvac_entity}"
                          temperature: !lambda return x;

              - arc:
                  id: hvac_arc_current_temp
                  clickable: false
                  align: RIGHT_MID
                  arc_width: 10
                  x: 230
                  width: 450
                  height: 450
                  min_value: 50
                  max_value: 90
                  adjustable: true
                  adv_hittest: true
                  rotation: 90.0
                  start_angle: 10
                  end_angle: 170
                  arc_opa: TRANSP
                  indicator:
                    arc_opa: TRANSP
                  knob:
                    bg_color: color_dark_gray
                    border_width: 0
                    bg_opa: 80%

              - obj:
                  width: 140
                  height: 120
                  align: RIGHT_MID
                  bg_color: color_slate_blue_gray
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  widgets:
                    - label:
                        id: hvac_target_temperature_whole
                        x: -40
                        y: 0
                        align: RIGHT_MID
                        text_font: nunito_84
                        text_color: color_steel_blue
                        text: " "
                    - label:
                        id: hvac_target_temperature_fraction
                        x: -10
                        y: 15
                        align: RIGHT_MID
                        text_font: nunito_36
                        text_color: color_steel_blue
                        text: " "
                    - label:
                        id: hvac_target_temperature_measurement
                        x: -12
                        y: -20
                        align: RIGHT_MID
                        text_font: nunito_30
                        text_color: color_steel_blue
                        text: "°F"

              - label:
                  id: hvac_state_icon
                  x: -10
                  y: -90
                  align: RIGHT_MID
                  text_font: icons_48
                  text_color: color_steel_blue
                  text: "${heating_icon}"

              - label:
                  id: hvac_target_temperature_icon
                  x: -70
                  y: 80
                  align: RIGHT_MID
                  text_font: icons_28
                  text_color: color_steel_blue
                  text: "${temperature_icon}"

              - label:
                  id: hvac_target_temperature_value
                  x: -10
                  y: 80
                  align: RIGHT_MID
                  text_font: nunito_30
                  text_color: color_steel_blue
                  text: " "


script:
  - id: hvac_get_and_set_translated_state
    parameters:
      state_str: string
    then:
      - lambda: |-
          std::string state = state_str;
          auto it = id(climate_translations).find(state);
          std::string translated_state = (it != id(climate_translations).end()) ? it->second : state;
          lv_label_set_text(id(hvac_state_label), translated_state.c_str());


select:
  - platform: lvgl
    widget: language_dropdown
    id: hvac_select_language
    on_value:
      then:
        - delay: 300ms
        - script.execute:
            id: hvac_get_and_set_translated_state
            state_str: !lambda 'return id(hvac_sensor_hvac_action).state;'


esphome:
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            lambda: 'return id(hvac_sensor_hvac_action).has_state();'
          then:
            - script.execute:
                id: hvac_get_and_set_translated_state
                state_str: !lambda 'return id(hvac_sensor_hvac_action).state;'


api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return id(hvac_sensor_hvac_action).has_state();'
        then:
          - script.execute:
              id: hvac_get_and_set_translated_state
              state_str: !lambda 'return id(hvac_sensor_hvac_action).state;'
