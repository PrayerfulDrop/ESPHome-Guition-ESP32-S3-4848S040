# https://esphome.io/components/climate/thermostat.html

substitutions:

  air_conditioner_name:       "air_conditioner"
  temperature_sensor:         "temperature_sensor"

  hvac_icon:                  "\U0000e93b"    # air conditioner nav button icon
  air_conditioner_icon:       "\U0000e93b"
  temperature_icon:           "\U0000e939"

  # Page ID — override to "ac_page" when using the thermostat+AC combo
  # (see Section 4 of main.yaml).  Leave as "hvac_page" for single-unit use.
  ac_page_id: "hvac_page"

  ac_page_title: "Air Conditioner"


sensor:

  # Thermostat target temperature
  - platform: homeassistant
    id: air_conditioner_sensor_target_temp
    entity_id: "${air_conditioner_entity}"
    attribute: temperature
    on_value: 
      then:
        - lvgl.arc.update:
            id: air_conditioner_arc_main
            value: !lambda return x;

        - lvgl.label.update:
            id: air_conditioner_target_temperature_whole
            text: !lambda |-
              static char buf[10];
              int whole_part = static_cast<int>(id(air_conditioner_sensor_target_temp).state);
              snprintf(buf, 10, "%d", whole_part);
              return buf;

        - lvgl.label.update:
            id: air_conditioner_target_temperature_fraction
            text: !lambda |-
              static char buf[10];
              int whole_part = static_cast<int>(id(air_conditioner_sensor_target_temp).state);
              int fractional_part = static_cast<int>((id(air_conditioner_sensor_target_temp).state - whole_part) * 10);
              snprintf(buf, 10, ".%01d", fractional_part);
              return buf;

  # Thermostat current temperature
  - platform: homeassistant
    id: air_conditioner_sensor_current_temp
    entity_id: "${air_conditioner_entity}"
    attribute: current_temperature
    on_value:

      - delay: 500ms

      - lvgl.label.update:
          id: air_conditioner_target_temperature_value
          text: !lambda |-
            char buf[8]; 
            sprintf(buf, "%.1f", x); 
            return std::string(buf);

      - lvgl.arc.update:
          id: air_conditioner_arc_current_temp
          value: !lambda return x;


text_sensor:

  # Thermostat name
  - platform: homeassistant
    id: air_conditioner_sensor_name
    entity_id: "${air_conditioner_entity}"
    attribute: friendly_name
    on_value:
      - lvgl.label.update:
          id: air_conditioner_name_label
          text: !lambda return x;

  # Thermostat hvac mode
  - platform: homeassistant
    id: air_conditioner_sensor_hvac_mode
    entity_id: "${air_conditioner_entity}"
    attribute: hvac_action
    on_value:
      - script.execute:
          id: air_conditioner_get_and_set_translated_state
          state_str: !lambda 'return id(air_conditioner_sensor_hvac_mode).state;'
      - if:
          condition:
            lambda: 'return id(air_conditioner_sensor_hvac_mode).state == "cooling";'
          then:
            - lvgl.label.update:
                id: ac_status
                text_color: color_sky_blue
          else:
            - lvgl.label.update:
                id: ac_status
                text_color: color_steel_blue

lvgl:

  pages:
    - id: ${ac_page_id}
      bg_color: color_slate_blue_gray
      widgets:
        # ── Page title ──────────────────────────────────────────────────────
        - label:
            id: air_conditioner_header
            align: TOP_MID
            y: 20
            text_font: nunito_20
            text_color: color_misty_blue
            text: "${ac_page_title}"

        # ── Divider under title ──────────────────────────────────────────────
        - obj:
            align: TOP_MID
            y: 48
            width: 440
            height: 1
            pad_all: 0
            bg_color: color_misty_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 0

        # State
        - obj:
            id: air_conditioner_state
            x: 20
            y: 58
            width: 400
            height: 60
            align: TOP_LEFT
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: air_conditioner_state_label
                  x: 20
                  align: LEFT_MID
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: " "

        # Controls
        - obj:
            id: air_conditioner_controls
            x: 20
            y: 120
            width: 360
            height: 248
            align: TOP_LEFT
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:

              - button:
                  x: 20
                  y: -60
                  width: 80
                  height: 80
                  bg_opa: TRANSP
                  border_color: color_misty_blue
                  border_width: 5
                  border_opa: 80%
                  shadow_opa: TRANSP
                  radius: 40
                  align: LEFT_MID
                  widgets:
                    - label:
                        y: -2
                        align: CENTER
                        text_font: nunito_64
                        text_color: color_steel_blue
                        text: "+"
                  on_press:
                      then:
                        - lambda: |-
                            auto temp = id(air_conditioner_sensor_target_temp).state + 0.5;
                            id(air_conditioner_sensor_target_temp).publish_state(temp);
                        - homeassistant.service:
                            service: climate.set_temperature
                            data:
                              entity_id: "${air_conditioner_entity}"
                              temperature: !lambda 'return id(air_conditioner_sensor_target_temp).state;'
              - button:
                  x: 20
                  y: 60
                  width: 80
                  height: 80
                  bg_opa: TRANSP
                  border_color: color_misty_blue
                  border_width: 5
                  border_opa: 80%
                  shadow_opa: TRANSP
                  radius: 40
                  align: LEFT_MID
                  widgets:
                    - label:
                        y: -2
                        align: CENTER
                        text_font: nunito_64
                        text_color: color_steel_blue
                        text: "-"
                  on_press:
                      then:
                        - lambda: |-
                            auto temp = id(air_conditioner_sensor_target_temp).state - 0.5;
                            id(air_conditioner_sensor_target_temp).publish_state(temp);
                        - homeassistant.service:
                            service: climate.set_temperature
                            data:
                              entity_id: "${air_conditioner_entity}"
                              temperature: !lambda 'return id(air_conditioner_sensor_target_temp).state;'

        # Hidden label – keeps sensor update target valid
        - label:
            id: air_conditioner_name_label
            hidden: true
            text: ""
            text_font: nunito_16

        # main — constrained to content area (y=49..369, above nav bar)
        - obj:
            id: air_conditioner_bg_main
            width: 250
            height: 320
            y: 49
            align: TOP_RIGHT
            pad_all: 0
            bg_opa: TRANSP
            scrollable: false
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:

              - obj:
                  id: air_conditioner_bg_placeholder
                  radius: 160
                  x: 155
                  width: 320
                  height: 320
                  align: RIGHT_MID
                  bg_color: color_slate_blue_gray
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP

              - obj:
                  id: air_conditioner_temp_arc_bg
                  radius: 155
                  x: 150
                  width: 310
                  height: 310
                  align: RIGHT_MID
                  bg_color: color_sky_blue
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP

              - meter:
                  id: air_conditioner_meter
                  x: 130
                  height: 270
                  width: 270
                  border_width: 0
                  bg_color: color_slate_blue_gray
                  align: RIGHT_MID
                  text_color: color_steel_blue
                  scales:
                    - range_from: 50
                      range_to: 90
                      angle_range: 160
                      rotation: 100.0
                      ticks:
                        width: 1
                        count: 21
                        length: 10
                        color: color_white
                        major:
                          stride: 5
                          width: 5
                          length: 15
                          color: color_white
                          label_gap: 15
                      indicators:
                        - tick_style:
                            start_value: 10
                            end_value: 30
                            color_start: 0x000080
                            color_end: 0x99CCFF
                            width: 1

              - arc:
                  id: air_conditioner_arc_main
                  align: RIGHT_MID
                  arc_width: 30
                  x: 150
                  width: 310
                  height: 310
                  min_value: 50
                  max_value: 90
                  adjustable: true
                  adv_hittest: true
                  rotation: 90.0
                  start_angle: 10
                  end_angle: 170
                  arc_opa: TRANSP
                  indicator:
                    arc_opa: TRANSP
                    arc_width: 40
                  knob:
                    border_color: color_white
                    border_width: 7
                    bg_opa: TRANSP
                  on_release:
                    - homeassistant.service:
                        service: climate.turn_on
                        data:
                          entity_id: "${air_conditioner_entity}"

                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: "${air_conditioner_entity}"
                          temperature: !lambda return x;

              - arc:
                  id: air_conditioner_arc_current_temp
                  clickable: false
                  align: RIGHT_MID
                  arc_width: 10
                  x: 145
                  width: 300
                  height: 300
                  min_value: 50
                  max_value: 90
                  adjustable: true
                  adv_hittest: true
                  rotation: 90.0
                  start_angle: 10
                  end_angle: 170
                  arc_opa: TRANSP
                  indicator:
                    arc_opa: TRANSP
                  knob:
                    bg_color: color_white
                    border_width: 0
                    border_opa: TRANSP

              - obj:
                  width: 130
                  height: 95
                  align: RIGHT_MID
                  bg_color: color_slate_blue_gray
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  widgets:

                    - label:
                        id: air_conditioner_target_temperature_whole
                        x: -32
                        y: 0
                        align: RIGHT_MID
                        text_font: nunito_64
                        text_color: color_steel_blue
                        text: " "

                    - label:
                        id: air_conditioner_target_temperature_fraction
                        x: -7
                        y: 10
                        align: RIGHT_MID
                        text_font: nunito_30
                        text_color: color_steel_blue
                        text: " "

                    - label:
                        id: air_conditioner_target_temperature_measurement
                        x: -8
                        y: -14
                        align: RIGHT_MID
                        text_font: nunito_20
                        text_color: color_steel_blue
                        text: "°F"

              - label:
                  id: air_conditioner_state_icon
                  x: -10
                  y: -85
                  align: RIGHT_MID
                  text_font: icons_48
                  text_color: color_steel_blue
                  text: "${air_conditioner_icon}"

              - label:
                  id: air_conditioner_target_temperature_icon
                  x: -70
                  y: 80
                  align: RIGHT_MID
                  text_font: icons_28
                  text_color: color_steel_blue
                  text: "${temperature_icon}"

              - label:
                  id: air_conditioner_target_temperature_value
                  x: -10
                  y: 80
                  align: RIGHT_MID
                  text_font: nunito_30
                  text_color: color_steel_blue
                  text: " "


script:
  - id: air_conditioner_get_and_set_translated_state
    parameters:
      state_str: string
    then:   
      - lambda: |-
          std::string state = state_str;
          
          auto it = id(climate_translations).find(state);
          std::string translated_state = (it != id(climate_translations).end()) ? it->second : state;
          
          lv_label_set_text(id(air_conditioner_state_label), translated_state.c_str());

  - id: apply_ac_ui_labels
    then:
      - lambda: |-
          // 0=de 1=es 2=fr 3=en-GB 4=it 5=pt 6=ru 7=en 8=pl
          static const char* const t[9] = {
            "${ac_page_title}",  // de
            "${ac_page_title}",  // es
            "${ac_page_title}",  // fr
            "${ac_page_title}",  // en-GB
            "${ac_page_title}",  // it
            "${ac_page_title}",  // pt
            "${ac_page_title}",  // ru
            "${ac_page_title}",  // en
            "${ac_page_title}",  // pl
          };
          int l = id(current_language);
          if (l < 0 || l > 8) l = 7;
          lv_label_set_text(id(air_conditioner_header), t[l]);

select:
  - platform: lvgl
    widget: language_dropdown
    id: air_conditioner_select_language
    on_value:
      then:
        - delay: 300ms
        - script.execute:
            id: air_conditioner_get_and_set_translated_state
            state_str: !lambda 'return id(air_conditioner_sensor_hvac_mode).state;'
        - script.execute: apply_ac_ui_labels


esphome:
  on_boot:
    priority: -100
    then:
      - script.execute: apply_ac_ui_labels
      - if:
          condition:
            lambda: 'return id(air_conditioner_sensor_hvac_mode).has_state();'
          then:
            - script.execute:
                id: air_conditioner_get_and_set_translated_state
                state_str: !lambda 'return id(air_conditioner_sensor_hvac_mode).state;'

api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return id(air_conditioner_sensor_hvac_mode).has_state();'
        then:
          - script.execute:
              id: air_conditioner_get_and_set_translated_state
              state_str: !lambda 'return id(air_conditioner_sensor_hvac_mode).state;'