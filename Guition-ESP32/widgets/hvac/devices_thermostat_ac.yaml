# devices_thermostat_ac.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Devices page variant for the Thermostat + Air Conditioner combination.
# Use this instead of devices.yaml when both widgets are active (Option 4 in
# Section 4 of main.yaml).
#
# Row 2 has three buttons: Thermostat | AC | Fans
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  music_icon:       "\U0000e91b"    # music note  (icons_72)
  vacuum_icon:      "\U0000e922"    # vacuum      (icons_72)
  # Icons — override in main.yaml Section 4 if desired
  thermostat_icon:  "\U0000e925"    # thermostat / heating
  ac_icon:          "\U0000e93b"    # air conditioner / cooling


packages:
  media_player: !include ../media_player/media_player.yaml
  vacuum:       !include ../vacuum/vacuum_widget.yaml
  alarm_panel:  !include ../alarm_panel/alarm_panel.yaml


lvgl:
  pages:
    - id: devices_page
      bg_color: color_slate_blue_gray
      widgets:
        - obj:
            id: devices_main
            y: 20
            width: 440
            height: 340
            pad_all: 0
            align: TOP_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            border_opa: TRANSP
            border_width: 0
            radius: 10
            widgets:

              # ── Row 1: Alarm · Media Player · Vacuum ─────────────────────
              - obj:
                  y: 10
                  width: 440
                  height: 150
                  pad_all: 0
                  align: TOP_MID
                  bg_opa: TRANSP
                  shadow_opa: TRANSP
                  border_opa: TRANSP
                  border_width: 0
                  radius: 10
                  widgets:

                    - button:
                        id: alarm_panel_page_btn
                        x: 35
                        align: LEFT_MID
                        width: 100
                        height: 100
                        radius: 10
                        bg_color: color_slate_blue_gray
                        shadow_opa: TRANSP
                        widgets:
                          - label:
                              align: CENTER
                              text_color: color_steel_blue
                              text_font: mdi_icons_72
                              text: "${shield_away_icon}"
                        on_press:
                          - lvgl.widget.hide: menu_controls_main
                          - lvgl.page.show:
                              id: alarm_panel_page
                              animation: OUT_RIGHT
                              time: 300ms

                    - button:
                        id: media_player_page_btn
                        x: 170
                        align: LEFT_MID
                        width: 100
                        height: 100
                        radius: 10
                        bg_color: color_slate_blue_gray
                        shadow_opa: TRANSP
                        widgets:
                          - label:
                              align: CENTER
                              text_color: color_steel_blue
                              text_font: icons_90
                              text: "${music_icon}"
                        on_press:
                          - lvgl.widget.hide: menu_controls_main
                          - lvgl.page.show:
                              id: media_player_page
                              animation: OUT_RIGHT
                              time: 300ms

                    - button:
                        id: vacuum_page_btn
                        x: 305
                        align: LEFT_MID
                        width: 100
                        height: 100
                        radius: 10
                        bg_color: color_slate_blue_gray
                        shadow_opa: TRANSP
                        widgets:
                          - label:
                              align: CENTER
                              text_color: color_steel_blue
                              text_font: icons_72
                              text: "${vacuum_icon}"
                        on_press:
                          - lvgl.widget.hide: menu_controls_main
                          - lvgl.page.show:
                              id: vacuum_page
                              animation: OUT_RIGHT
                              time: 300ms

              # ── Row 2: Thermostat · AC · Fans ─────────────────────────────
              - obj:
                  y: 120
                  width: 440
                  height: 150
                  pad_all: 0
                  align: TOP_MID
                  bg_opa: TRANSP
                  shadow_opa: TRANSP
                  border_opa: TRANSP
                  border_width: 0
                  radius: 10
                  widgets:

                    - button:
                        id: thermostat_btn
                        x: 20
                        align: LEFT_MID
                        width: 100
                        height: 100
                        radius: 10
                        bg_color: color_slate_blue_gray
                        shadow_opa: TRANSP
                        widgets:
                          - label:
                              align: CENTER
                              text_color: color_steel_blue
                              text_font: icons_72
                              text: "${thermostat_icon}"
                        on_press:
                          - lvgl.widget.hide: menu_controls_main
                          - lvgl.page.show:
                              id: thermostat_page
                              animation: OUT_RIGHT
                              time: 300ms

                    - button:
                        id: ac_btn
                        x: 170
                        align: LEFT_MID
                        width: 100
                        height: 100
                        radius: 10
                        bg_color: color_slate_blue_gray
                        shadow_opa: TRANSP
                        widgets:
                          - label:
                              align: CENTER
                              text_color: color_steel_blue
                              text_font: icons_72
                              text: "${ac_icon}"
                        on_press:
                          - lvgl.widget.hide: menu_controls_main
                          - lvgl.page.show:
                              id: ac_page
                              animation: OUT_RIGHT
                              time: 300ms

                    - button:
                        id: fans_page_btn
                        x: 320
                        align: LEFT_MID
                        width: 100
                        height: 100
                        radius: 10
                        bg_color: color_slate_blue_gray
                        shadow_opa: TRANSP
                        widgets:
                          - label:
                              align: CENTER
                              text_color: color_steel_blue
                              text_font: fan_icons_72
                              text: "\U0000E901"    # ceiling-fan
                        on_press:
                          - lvgl.widget.hide: menu_controls_main
                          - lvgl.page.show:
                              id: fans_group_page
                              animation: OUT_RIGHT
                              time: 300ms
