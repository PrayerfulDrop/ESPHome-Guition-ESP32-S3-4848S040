            height: 168
            radius: 16
            bg_color: color_steel_blue
            bg_opa: 25%
            border_color: color_misty_blue
            border_width: 1
            border_opa: 20%
            shadow_opa: TRANSP
            pad_all: 0
            widgets:

              - obj:
                  id: people_avatar_4
                  align: TOP_MID
                  y: 14
