                  radius: 38
                  bg_color: 0x606682
                  bg_opa: 100%
                  border_color: color_misty_blue
                  border_width: 2
                  border_opa: 25%
                  shadow_opa: TRANSP
                  pad_all: 0
                  widgets:
                    - label:
                        align: CENTER
                        text_font: nunito_30
                        text_color: 0xFFFFFF
