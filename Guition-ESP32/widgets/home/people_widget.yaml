        # ── Back button ──────────────────────────────────────────────────────
        - button:
            id: people_back_btn
            x: 20
            y: -20
            width: 440
            height: 60
            align: BOTTOM_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  align: CENTER
                  text_font: icons_28
                  text_color: color_misty_blue
                  text: "\U0000e902"   # exit icon
            on_press:
              - lvgl.widget.show: menu_controls_main
              - lvgl.page.show:
                  id: home_page
                  animation: OUT_LEFT
                  time: 300ms
