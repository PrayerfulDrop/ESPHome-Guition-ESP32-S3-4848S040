# people_widget.yaml
# ─────────────────────────────────────────────────────────────────────────────
# People presence detail page — shown when the person indicators bar is tapped.
# Displays up to 4 person cards with a coloured status bubble (green=home,
# grey=away).  Status is updated live by the person_state_N sensors in
# home_widget.yaml.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  # Safe defaults — overridden by main.yaml
  person_entity_1:   "sensor.disabled"
  person_initials_1: ""
  person_entity_2:   "sensor.disabled"
  person_initials_2: ""
  person_entity_3:   "sensor.disabled"
  person_initials_3: ""
  person_entity_4:   "sensor.disabled"
  person_initials_4: ""


lvgl:
  pages:
    - id: people_page
      bg_color: color_slate_blue_gray
      widgets:

        # ── Page title ───────────────────────────────────────────────────────
        - label:
            align: TOP_MID
            y: 20
            text_font: nunito_20
            text_color: color_misty_blue
            text: "People"

        # ── Divider under title ──────────────────────────────────────────────
        - obj:
            align: TOP_MID
            y: 50
            width: 440
            height: 1
            pad_all: 0
            bg_color: color_misty_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 0

        # ── Card 1 (top-left) ────────────────────────────────────────────────
        - obj:
            id: people_card_1
            x: 20
            y: 62
            width: 208
            height: 168
            radius: 16
            bg_color: color_steel_blue
            bg_opa: 25%
            border_color: color_misty_blue
            border_width: 1
            border_opa: 20%
            shadow_opa: TRANSP
            pad_all: 0
            widgets:

              # Avatar circle — bg_color reflects presence state
              - obj:
                  id: people_avatar_1
                  align: TOP_MID
                  y: 14
                  width: 76
                  height: 76
                  radius: 38
                  bg_color: 0x606682
                  bg_opa: 100%
                  border_color: color_misty_blue
                  border_width: 2
                  border_opa: 25%
                  shadow_opa: TRANSP
                  pad_all: 0
                  widgets:
                    - label:
                        align: CENTER
                        text_font: nunito_30
                        text_color: 0xFFFFFF
                        text: "${person_initials_1}"

              # Status row — dot + text
              - obj:
                  align: BOTTOM_MID
                  y: -16
                  width: 170
                  height: 26
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  shadow_opa: TRANSP
                  pad_all: 0
                  widgets:
                    - obj:
                        id: people_status_dot_1
                        align: LEFT_MID
                        x: 0
                        width: 12
                        height: 12
                        radius: 6
                        bg_color: 0x606682
                        bg_opa: 100%
                        border_opa: TRANSP
                        shadow_opa: TRANSP
                    - label:
                        id: people_status_text_1
                        align: LEFT_MID
                        x: 20
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Away"

        # ── Card 2 (top-right) ───────────────────────────────────────────────
        - obj:
            id: people_card_2
            x: 252
            y: 62
            width: 208
            height: 168
            radius: 16
            bg_color: color_steel_blue
            bg_opa: 25%
            border_color: color_misty_blue
            border_width: 1
            border_opa: 20%
