# people_widget.yaml
# ─────────────────────────────────────────────────────────────────────────────
# People presence detail page — shown when the person indicators bar is tapped.
# Displays up to 4 person cards with a coloured status bubble (green=home,
# grey=away).  Status is updated live by the person_state_N sensors in
# home_widget.yaml.  Person name is fetched from HA as a subtitle.
# Cards for sensor.disabled slots are hidden at boot.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  # Safe defaults — overridden by main.yaml
  people_page_title:  "People"
  person_away_label:  "Away"

  person_entity_1:   "sensor.disabled"
  person_initials_1: ""
  person_entity_2:   "sensor.disabled"
  person_initials_2: ""
  person_entity_3:   "sensor.disabled"
  person_initials_3: ""
  person_entity_4:   "sensor.disabled"
  person_initials_4: ""


# ── Boot: hide disabled person cards ─────────────────────────────────────────
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          // People page cards
          if (std::string("${person_entity_1}") == "sensor.disabled")
            lv_obj_add_flag(id(people_card_1), LV_OBJ_FLAG_HIDDEN);
          if (std::string("${person_entity_2}") == "sensor.disabled")
            lv_obj_add_flag(id(people_card_2), LV_OBJ_FLAG_HIDDEN);
          if (std::string("${person_entity_3}") == "sensor.disabled")
            lv_obj_add_flag(id(people_card_3), LV_OBJ_FLAG_HIDDEN);
          if (std::string("${person_entity_4}") == "sensor.disabled")
            lv_obj_add_flag(id(people_card_4), LV_OBJ_FLAG_HIDDEN);
          // Top bar flex indicators — hidden items are excluded from flex layout
          if (std::string("${person_entity_1}") == "sensor.disabled")
            lv_obj_add_flag(id(person_indicator_1), LV_OBJ_FLAG_HIDDEN);
          if (std::string("${person_entity_2}") == "sensor.disabled")
            lv_obj_add_flag(id(person_indicator_2), LV_OBJ_FLAG_HIDDEN);
          if (std::string("${person_entity_3}") == "sensor.disabled")
            lv_obj_add_flag(id(person_indicator_3), LV_OBJ_FLAG_HIDDEN);
          if (std::string("${person_entity_4}") == "sensor.disabled")
            lv_obj_add_flag(id(person_indicator_4), LV_OBJ_FLAG_HIDDEN);
          // pad_column is not a YAML-exposed property — set gap between flex items here
          lv_obj_set_style_pad_column(id(person_indicators_container), 8, 0);


# ── Person name text sensors (friendly_name attribute from HA) ────────────────
text_sensor:
  - platform: homeassistant
    id: people_name_sensor_1
    entity_id: "${person_entity_1}"
    attribute: friendly_name
    on_value:
      - if:
          condition:
            lambda: 'return std::string("${person_entity_1}") != "sensor.disabled";'
          then:
            - lvgl.label.update:
                id: people_name_1
                text: !lambda return x;

  - platform: homeassistant
    id: people_name_sensor_2
    entity_id: "${person_entity_2}"
    attribute: friendly_name
    on_value:
      - if:
          condition:
            lambda: 'return std::string("${person_entity_2}") != "sensor.disabled";'
          then:
            - lvgl.label.update:
                id: people_name_2
                text: !lambda return x;

  - platform: homeassistant
    id: people_name_sensor_3
    entity_id: "${person_entity_3}"
    attribute: friendly_name
    on_value:
      - if:
          condition:
            lambda: 'return std::string("${person_entity_3}") != "sensor.disabled";'
          then:
            - lvgl.label.update:
                id: people_name_3
                text: !lambda return x;

  - platform: homeassistant
    id: people_name_sensor_4
    entity_id: "${person_entity_4}"
    attribute: friendly_name
    on_value:
      - if:
          condition:
            lambda: 'return std::string("${person_entity_4}") != "sensor.disabled";'
          then:
            - lvgl.label.update:
                id: people_name_4
                text: !lambda return x;


lvgl:
  pages:
    - id: people_page
      bg_color: color_slate_blue_gray
      widgets:

        # ── Page title ───────────────────────────────────────────────────────
        - label:
            id: people_page_title_lbl
            align: TOP_MID
            y: 20
            text_font: nunito_20
            text_color: color_misty_blue
            text: "${people_page_title}"

        # ── Divider under title ──────────────────────────────────────────────
        - obj:
            align: TOP_MID
            y: 48
            width: 440
            height: 1
            pad_all: 0
            bg_color: color_misty_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 0

        # ── Card 1 (top-left) ────────────────────────────────────────────────
        # Layout: 2×2 grid, card height 148 so row 2 bottom = 216+148 = 364,
        # staying clear of the bottom menu bar which starts at y ≈ 380.
        - obj:
            id: people_card_1
            x: 20
            y: 58
            width: 208
            height: 148
            radius: 16
            bg_color: color_steel_blue
            bg_opa: 25%
            border_color: color_misty_blue
            border_width: 1
            border_opa: 20%
            shadow_opa: TRANSP
            pad_all: 0
            widgets:

              # Avatar circle — bg_color reflects presence state
              - obj:
                  id: people_avatar_1
                  align: TOP_MID
                  y: 10
                  width: 64
                  height: 64
                  radius: 32
                  bg_color: 0x606682
                  bg_opa: 100%
                  border_color: color_misty_blue
                  border_width: 2
                  border_opa: 25%
                  shadow_opa: TRANSP
                  pad_all: 0
                  widgets:
                    - label:
                        align: CENTER
                        text_font: nunito_30
                        text_color: 0xFFFFFF
                        text: "${person_initials_1}"

              # Person name subtitle
              - label:
                  id: people_name_1
                  align: TOP_MID
                  y: 82
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: " "

              # Status row — dot + text
              - obj:
                  align: BOTTOM_MID
                  y: -10
                  width: 170
                  height: 26
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  shadow_opa: TRANSP
                  pad_all: 0
                  widgets:
                    - obj:
                        id: people_status_dot_1
                        align: LEFT_MID
                        x: 0
                        width: 12
                        height: 12
                        radius: 6
                        bg_color: 0x606682
                        bg_opa: 100%
                        border_opa: TRANSP
                        shadow_opa: TRANSP
                    - label:
                        id: people_status_text_1
                        align: LEFT_MID
                        x: 20
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "${person_away_label}"

