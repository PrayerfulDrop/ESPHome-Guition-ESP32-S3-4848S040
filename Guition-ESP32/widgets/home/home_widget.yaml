    id: notification_sensor
    entity_id: "${notification_entity}"
    on_value:
      then:
        - if:
            condition:
              lambda: return !x.empty() && x != "unknown" && x != "unavailable";
            then:
              - lvgl.label.update:
                  id: notification_text
                  text: !lambda return x;
              - lvgl.widget.show: notification_banner
