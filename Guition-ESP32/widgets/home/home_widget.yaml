substitutions:
  # Person presence — safe defaults overridden by main.yaml
  person_entity_1:   "sensor.disabled"
  person_initials_1: ""
  person_entity_2:   "sensor.disabled"
  person_initials_2: ""
  person_entity_3:   "sensor.disabled"
  person_initials_3: ""
  person_entity_4:   "sensor.disabled"
  person_initials_4: ""

  # Notification banner entity — safe default
  notification_entity: "sensor.disabled"

  lock_icon:               "\U0000e92e"
  air_conditioner_icon:    "\U0000e93b"
  heating_icon:            "\U0000e936"
  hvac_icon:               "\U0000e925"  # thermostat-dial
  info_icon:               "\U0000e904"
  ha_icon:                 "\U0000e935" # home assistant
  calendar_icon:           "\U000F00ED" # mdi-calendar
  wifi_25_icon:            "\U0000e931" # wifi signal from 25% to 1%
  wifi_50_icon:            "\U0000e932" # wifi signal from 50% to 25%
  wifi_75_icon:            "\U0000e933" # wifi signal from 75% to 50%
  wifi_100_icon:           "\U0000e934" # wifi signal from 100% to 75% or disable
  tvoc:                    "\U0000e93a" # air quality
  temperature_icon:        "\U0000e939" 
  illumination:            "\U0000e92f" # lux

globals:
  - id: display_lock
    type: bool
    restore_value: true
    initial_value: "false"


sensor:
  # WI-FI Signal
  - platform: wifi_signal
    id: wifi_signal_percent
    update_interval: 30s
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    on_value:
      then:
        - lvgl.label.update:
            id: wifi_status
            text_color: !lambda |-
              if (id(wifi_signal_percent).state > 0) {
              return lv_color_hex(0x5CA848);
              }
              return lv_color_hex(0xFF0000);
            text: !lambda |-
              if (id(wifi_signal_percent).state > 0 && id(wifi_signal_percent).state < 26) {
              return "${wifi_25_icon}";
              } else if (id(wifi_signal_percent).state > 25 && id(wifi_signal_percent).state < 51) {
              return "${wifi_50_icon}";
              } else if (id(wifi_signal_percent).state > 50 && id(wifi_signal_percent).state < 76) {
              return "${wifi_75_icon}";
              } else if (id(wifi_signal_percent).state > 75) {
              return "${wifi_100_icon}";
              }
              return "${wifi_100_icon}";

  # Weather temperature sensor
  - platform: homeassistant
    id: weather_temp
    entity_id: "${weather_entity}"
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: weather_temperature
            text: !lambda |-
              static char buf[10];
              float t = id(weather_temp).state;
              if (id(temp_unit) == 1) t = (t - 32.0f) * 5.0f / 9.0f;
              snprintf(buf, sizeof(buf), "%.0f°", t);
              return buf;

  # Indoor temperature — kept for HVAC climate component
  - platform: homeassistant
    id: temperature_sensor
    entity_id: "${temperature_entity}"


