time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: "${time_zone}"
#  - platform: sntp
#    id: sntp_time
#    timezone: ${time_zone}
#    servers:
#     - ntp0.ntp-servers.net
#     - ntp1.ntp-servers.net
#     - ntp2.ntp-servers.net
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update
          - script.execute: screensaver_tick

script:

  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[16];
            auto now = id(homeassistant_time).now();
            if (id(time_format) == 1) {
              snprintf(time_buf, sizeof(time_buf), "%d:%02d", now.hour, now.minute);
            } else {
              const char *ampm = (now.hour >= 12) ? "PM" : "AM";
              int hour_12 = (now.hour % 12 == 0) ? 12 : now.hour % 12;
              snprintf(time_buf, sizeof(time_buf), "%d:%02d %s", hour_12, now.minute, ampm);
            }
            return time_buf;

      - lvgl.label.update:
          id: display_date
          text: !lambda |-
            static char date_buf[32];
            auto now = id(homeassistant_time).now();
            static const char* days[] = {"Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"};
            snprintf(date_buf, sizeof(date_buf), "%s, %d/%02d/%04d", days[(now.day_of_week)-1], now.month, now.day_of_month, now.year);
            return date_buf;

  - id: notification_dismiss
    mode: restart
    then:
      - delay: 10s
      - lvgl.widget.hide: notification_banner

  - id: screensaver_tick
    then:
      - if:
          condition:
            lambda: return id(screensaver_active);
          then:
            - script.execute: screensaver_update

  - id: screensaver_update
    then:
      # Show the correct style group, hide the others
      - lambda: |-
          bool dig = (id(screensaver_style) == 0);
          bool ana = (id(screensaver_style) == 1);
          bool cal = (id(screensaver_style) == 2);
