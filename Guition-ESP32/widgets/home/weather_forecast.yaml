# ── LVGL forecast page ────────────────────────────────────────────────────────
# Canvas: 480×480 display, 440px usable width (20px margins each side)
#
#  y=20   h=40  ── Title bar ─────────────────────────────────────────────────
#  y=70   h=130 ── Hero card (Today): icon + hi/lo/precip ────────────────────
#  y=210  h=170 ── Four day cards in a row ──────────────────────────────────
#  y=430  h=50  ── Back / Refresh buttons ────────────────────────────────────

lvgl:
  pages:
    - id: weather_forecast_page
      bg_color: color_slate_blue_gray
      widgets:

        # ── Title bar ─────────────────────────────────────────────────────────
        - obj:
            id: forecast_title_bar
            y: 20
            width: 440
            height: 40
            align: TOP_MID
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "5-Day Forecast"

        # ── Hero card: Today ──────────────────────────────────────────────────
        - obj:
            id: forecast_today_card
            x: 20
            y: 70
            width: 440
            height: 130
            align: TOP_LEFT
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 12
            widgets:
              # Weather icon left side – reuses existing 100×100 images, scaled via position
              - image:
                  id: fc_icon_0
                  x: 15
                  y: 0
                  align: LEFT_MID
                  src: sunny_img

              # "Today" label
              - label:
                  id: fc_day_0
                  x: 130
                  y: -28
                  align: LEFT_MID
                  text_font: nunito_20
                  text_color: color_sky_blue
                  text: "Today"

              # High temperature – large
              - label:
                  id: fc_hi_0
                  x: 130
                  y: 4
                  align: LEFT_MID
                  text_font: nunito_36
                  text_color: color_white
                  text: "--°"

              # Low temperature – smaller, offset right
              - label:
                  id: fc_lo_0
                  x: 230
                  y: 14
                  align: LEFT_MID
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "--°"

              # Rain probability – top right
              - label:
                  id: fc_precip_0
                  x: -14
                  y: -18
                  align: RIGHT_MID
                  text_font: nunito_20
                  text_color: color_sky_blue
                  text: "--%"
              - label:
                  x: -14
                  y: 12
                  align: RIGHT_MID
                  text_font: nunito_16
                  text_color: color_steel_blue
                  text: "rain"

        # ── Four day cards (equal width, full row) ────────────────────────────
        # 4 cards × 100px + 3 gaps × 8px + 20px left margin + 8px right margin = 448 ≈ fits
        # x: 20, 128, 236, 344   width: 100 each

        # Day 1
        - obj:
            id: forecast_day1_card
            x: 20
            y: 210
            width: 100
            height: 170
            align: TOP_LEFT
            pad_all: 6
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 12
            widgets:
              - label:
                  id: fc_day_1
                  align: TOP_MID
                  y: 2
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "---"
              - image:
                  id: fc_icon_1
                  align: TOP_MID
                  y: 24
