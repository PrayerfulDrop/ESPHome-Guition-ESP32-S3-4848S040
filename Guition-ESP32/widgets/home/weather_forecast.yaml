# weather_forecast.yaml
# ─────────────────────────────────────────────────────────────────────────────
# 5-day forecast page using HA's weather.get_forecasts action.
# Uses response_template to flatten JSON in Jinja on the HA side –
# no complex C++ parsing needed.
#
# Layout: hero "Today" card (full-width) + 4 equal day cards below
# Theme:  dark – matches the rest of the project
#
# Auto-fetches on HA client connect and every hour.
# Include from home.yaml:  forecast: !include weather_forecast.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Condition → image mapping ─────────────────────────────────────────────────
# Maps HA condition strings to the image IDs already defined in image.yaml.
# partlycloudy uses the sun variant by default; the icon update scripts swap
# it to the moon variant at night using the sun_state_sensor already in
# home_widget.yaml.

# (No mapping block – ESPHome has no native string→image mapping type.
#  Each icon update script below uses a C++ if/else chain with direct
#  lv_img_set_src() calls referencing the image pointers from image.yaml.)

# ── Globals – condition strings needed for icon updates ───────────────────────
globals:
  - id: forecast_condition_0
    type: std::string
    initial_value: '"unknown"'
  - id: forecast_condition_1
    type: std::string
    initial_value: '"unknown"'
  - id: forecast_condition_2
    type: std::string
    initial_value: '"unknown"'
  - id: forecast_condition_3
    type: std::string
    initial_value: '"unknown"'
  - id: forecast_condition_4
    type: std::string
    initial_value: '"unknown"'

# ── Auto-fetch: every hour and on HA client connect ───────────────────────────
time:
  - platform: homeassistant
    on_time:
      - hours: '*'
        minutes: 0
        seconds: 30
        then:
          - script.execute: fetch_weather_forecast

api:
  on_client_connected:
    - delay: 3s
    - script.execute: fetch_weather_forecast

# ── Scripts ───────────────────────────────────────────────────────────────────
script:

  - id: fetch_weather_forecast
    then:
      - logger.log:
          level: INFO
          format: "Fetching weather forecast..."
      - homeassistant.action:
          action: weather.get_forecasts
          data:
            entity_id: ${weather_entity}
            type: daily
          capture_response: true
          # response_template runs Jinja on the HA side, flattening the nested
          # forecast array into a simple flat dict that ESPHome reads cleanly.
          response_template: >-
            {% set f = response["${weather_entity}"].forecast %}
            {% set result = {
              'condition_0': f[0].condition | default('unknown'),
              'hi_0':        f[0].temperature | default(0) | round(0) | string,
              'lo_0':        f[0].templow     | default(0) | round(0) | string,
              'day_0':       'Today',
              'precip_0':    f[0].precipitation_probability | default(0) | round(0) | string,
              'condition_1': f[1].condition | default('unknown'),
              'hi_1':        f[1].temperature | default(0) | round(0) | string,
              'lo_1':        f[1].templow     | default(0) | round(0) | string,
              'day_1':       (as_timestamp(f[1].datetime) + 43200) | timestamp_custom('%a'),
              'precip_1':    f[1].precipitation_probability | default(0) | round(0) | string,
              'condition_2': f[2].condition | default('unknown'),
              'hi_2':        f[2].temperature | default(0) | round(0) | string,
              'lo_2':        f[2].templow     | default(0) | round(0) | string,
              'day_2':       (as_timestamp(f[2].datetime) + 43200) | timestamp_custom('%a'),
              'precip_2':    f[2].precipitation_probability | default(0) | round(0) | string,
              'condition_3': f[3].condition | default('unknown'),
              'hi_3':        f[3].temperature | default(0) | round(0) | string,
              'lo_3':        f[3].templow     | default(0) | round(0) | string,
              'day_3':       (as_timestamp(f[3].datetime) + 43200) | timestamp_custom('%a'),
              'precip_3':    f[3].precipitation_probability | default(0) | round(0) | string,
              'condition_4': f[4].condition | default('unknown'),
              'hi_4':        f[4].temperature | default(0) | round(0) | string,
              'lo_4':        f[4].templow     | default(0) | round(0) | string,
              'day_4':       (as_timestamp(f[4].datetime) + 43200) | timestamp_custom('%a'),
              'precip_4':    f[4].precipitation_probability | default(0) | round(0) | string
            } %}
            {{ result | tojson }}
          on_success:
            # Store condition strings for icon mapping scripts
            - lambda: |-
                auto d = response["response"];
                id(forecast_condition_0) = d["condition_0"].as<std::string>();
                id(forecast_condition_1) = d["condition_1"].as<std::string>();
                id(forecast_condition_2) = d["condition_2"].as<std::string>();
                id(forecast_condition_3) = d["condition_3"].as<std::string>();
                id(forecast_condition_4) = d["condition_4"].as<std::string>();

            # Today hero card
            - lvgl.label.update:
                id: fc_day_0
                text: !lambda 'return response["response"]["day_0"].as<std::string>();'
            - lvgl.label.update:
                id: fc_hi_0
                text: !lambda 'return response["response"]["hi_0"].as<std::string>() + "\xc2\xb0";'
            - lvgl.label.update:
                id: fc_lo_0
                text: !lambda 'return response["response"]["lo_0"].as<std::string>() + "\xc2\xb0";'
            - lvgl.label.update:
                id: fc_precip_0
                text: !lambda 'return response["response"]["precip_0"].as<std::string>() + "%";'
            - script.execute: update_forecast_icon_0

            # Day 1
            - lvgl.label.update:
                id: fc_day_1
                text: !lambda 'return response["response"]["day_1"].as<std::string>();'
            - lvgl.label.update:
                id: fc_hi_1
                text: !lambda 'return response["response"]["hi_1"].as<std::string>() + "\xc2\xb0";'
            - lvgl.label.update:
                id: fc_lo_1
                text: !lambda 'return response["response"]["lo_1"].as<std::string>() + "\xc2\xb0";'
            - script.execute: update_forecast_icon_1

            # Day 2
            - lvgl.label.update:
                id: fc_day_2
                text: !lambda 'return response["response"]["day_2"].as<std::string>();'
            - lvgl.label.update:
                id: fc_hi_2
                text: !lambda 'return response["response"]["hi_2"].as<std::string>() + "\xc2\xb0";'
            - lvgl.label.update:
                id: fc_lo_2
                text: !lambda 'return response["response"]["lo_2"].as<std::string>() + "\xc2\xb0";'
            - script.execute: update_forecast_icon_2

            # Day 3
            - lvgl.label.update:
                id: fc_day_3
                text: !lambda 'return response["response"]["day_3"].as<std::string>();'
            - lvgl.label.update:
                id: fc_hi_3
                text: !lambda 'return response["response"]["hi_3"].as<std::string>() + "\xc2\xb0";'
            - lvgl.label.update:
                id: fc_lo_3
                text: !lambda 'return response["response"]["lo_3"].as<std::string>() + "\xc2\xb0";'
            - script.execute: update_forecast_icon_3

            # Day 4
            - lvgl.label.update:
                id: fc_day_4
                text: !lambda 'return response["response"]["day_4"].as<std::string>();'
            - lvgl.label.update:
                id: fc_hi_4
                text: !lambda 'return response["response"]["hi_4"].as<std::string>() + "\xc2\xb0";'
            - lvgl.label.update:
                id: fc_lo_4
                text: !lambda 'return response["response"]["lo_4"].as<std::string>() + "\xc2\xb0";'
            - script.execute: update_forecast_icon_4

          on_error:
            - logger.log:
                level: ERROR
                format: "Failed to fetch weather forecast"

  # ── Icon update scripts ───────────────────────────────────────────────────────
  # partlycloudy picks sun or moon based on sun_state_sensor (from home_widget.yaml).
  # All other conditions use a direct if/else chain with image.yaml pointers.

  - id: update_forecast_icon_0
    then:
      - lambda: |-
          std::string cond = id(forecast_condition_0);
          bool night = (id(sun_state_sensor).state == "below_horizon");
          const lv_img_dsc_t* src = cloudy_img->get_lv_img_dsc(); // fallback
          if      (cond == "sunny")            src = sunny_img->get_lv_img_dsc();
          else if (cond == "clear-night")      src = clear_night_img->get_lv_img_dsc();
          else if (cond == "cloudy")           src = cloudy_img->get_lv_img_dsc();
          else if (cond == "partlycloudy")     src = night ? partlycloudy_moon_img->get_lv_img_dsc() : partlycloudy_sun_img->get_lv_img_dsc();
          else if (cond == "rainy")            src = rainy_img->get_lv_img_dsc();
          else if (cond == "pouring")          src = pouring_img->get_lv_img_dsc();
          else if (cond == "lightning")        src = lightning_img->get_lv_img_dsc();
          else if (cond == "lightning-rainy")  src = lightning_rainy_img->get_lv_img_dsc();
          else if (cond == "snowy")            src = snowy_img->get_lv_img_dsc();
          else if (cond == "snowy-rainy")      src = snowy_rainy_img->get_lv_img_dsc();
          else if (cond == "fog")              src = fog_img->get_lv_img_dsc();
          else if (cond == "hail")             src = hail_img->get_lv_img_dsc();
          else if (cond == "windy")            src = windy_img->get_lv_img_dsc();
          else if (cond == "windy-variant")    src = windy_variant_img->get_lv_img_dsc();
          lv_img_set_src(id(fc_icon_0), src);

  - id: update_forecast_icon_1
