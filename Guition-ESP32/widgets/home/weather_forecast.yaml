                  text: "--°"

        # ── Refresh button ────────────────────────────────────────────────────
        - button:
            id: forecast_refresh_btn
            x: -20
            y: -20
            width: 200
            height: 50
            align: BOTTOM_RIGHT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Refresh"
            on_press:
              then:
                - script.execute: fetch_weather_forecast
