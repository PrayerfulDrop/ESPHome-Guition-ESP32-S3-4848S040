# settings_sensors.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Home Assistant text sensors that pull translation strings for each component.
# They populate the globals defined in settings_globals.yaml at runtime.
# Requires the display_tools HA integration / custom sensor to be configured.
# Included automatically by settings.yaml — do not include directly.
# ─────────────────────────────────────────────────────────────────────────────

text_sensor:

  # ── Language / flag ───────────────────────────────────────────────────────
  - platform: homeassistant
    id: translations_lang
    entity_id: sensor.display_tools
    on_value:
      - lambda: |-
          std::string lang_code = x;
          int lang_index = 7; // default: English (US)
          for (int i = 0; i <= 8; i++) {
            if (id(flag_icon_mapping_name)[i] == lang_code) {
              lang_index = i;
              break;
            }
          }
          id(current_language) = lang_index;

      - lvgl.dropdown.update:
          id: language_dropdown
          selected_index: !lambda |-
            int lang_index = 7;
            for (int i = 0; i <= 8; i++) {
              if (id(flag_icon_mapping_name)[i] == x) {
                lang_index = i;
                break;
              }
            }
            return lang_index;

      - lvgl.image.update:
          id: flag_language_image
          src: !lambda |-
            int lang_index = 7;
            for (int i = 0; i <= 8; i++) {
              if (id(flag_icon_mapping_name)[i] == x) {
                lang_index = i;
                break;
              }
            }
            return id(flag_icon_mapping_image)[lang_index];

  # ── Vacuum state translations ─────────────────────────────────────────────
  - platform: homeassistant
    id: translations_vacuum
    entity_id: sensor.display_tools
    attribute: vacuum
    on_value:
      then:
        - lambda: |-
            if (x.length() > 0) {
              JsonDocument doc;
              DeserializationError error = deserializeJson(doc, x);
              if (!error) {
                id(vacuum_translations).clear();
                for (auto kv : doc.as<JsonObject>()) {
                  id(vacuum_translations)[kv.key().c_str()] = kv.value().as<std::string>();
                }
              }
            }

