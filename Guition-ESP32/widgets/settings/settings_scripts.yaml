# settings_scripts.yaml
# ─────────────────────────────────────────────────────────────────────────────
# apply_theme  : updates all LVGL widget colours to match the selected theme.
# get_translation : looks up a localised string from the translation maps.
# Included automatically by settings.yaml — do not include directly.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  # HVAC page(s) included in the apply_theme page-background loop.
  # Single HVAC (default):       hvac_page_ref: "id(hvac_page)->obj"
  # Thermostat + AC combo:       hvac_page_ref: "id(thermostat_page)->obj, id(ac_page)->obj"
  hvac_page_ref: "id(hvac_page)->obj"

script:

  # ── apply_theme ──────────────────────────────────────────────────────────
  # Called on boot and whenever the user changes the theme dropdown.
  # Reads id(current_theme) and repaints every themed widget.
  - id: apply_theme
    then:
      - lambda: |-
          int theme = id(current_theme);

          // ── Palette ──────────────────────────────────────────────────────
          lv_color_t bg, surface, text;
          lv_opa_t   surf_opa;
          if (theme == 0) {        // Cherry Blossom Theme
            bg       = lv_color_hex(0x1A0610);   // deep cherry night
            surface  = lv_color_hex(0x8B2252);   // dark rose
            text     = lv_color_hex(0xFFD6E8);   // petal white-pink
            surf_opa = LV_OPA_60;
          } else if (theme == 2) { // Espeon Theme
            bg       = lv_color_hex(0x180D2E);
            surface  = lv_color_hex(0x4A2475);
            text     = lv_color_hex(0xF2DDFF);
            surf_opa = LV_OPA_60;
          } else if (theme == 3) { // Ocean Theme
            bg       = lv_color_hex(0x0A2235);
            surface  = lv_color_hex(0x174B70);
            text     = lv_color_hex(0x88CCE8);
            surf_opa = LV_OPA_70;
          } else if (theme == 4) { // Paris Theme
            bg       = lv_color_hex(0x0E0C1A);
            surface  = lv_color_hex(0x3A2608);
            text     = lv_color_hex(0xF4DFA8);
            surf_opa = LV_OPA_60;
          } else if (theme == 5) { // Patriotic Theme
            bg       = lv_color_hex(0x0A1628);   // deep navy
            surface  = lv_color_hex(0x7B1113);   // dark flag red
            text     = lv_color_hex(0xF5F5F0);   // star white
            surf_opa = LV_OPA_60;
          } else {                 // Dark Theme (default, theme == 1)
            bg       = lv_color_hex(0x343645);
            surface  = lv_color_hex(0x606682);
            text     = lv_color_hex(0x9BA2BC);
            surf_opa = LV_OPA_20;
          }

          // ── Page backgrounds ─────────────────────────────────────────────
          lv_obj_t* pages[] = {
            id(home_page)->obj, id(settings_page)->obj, id(system_info_page)->obj,
            id(alarm_panel_page)->obj, ${hvac_page_ref}, id(weather_forecast_page)->obj,
            id(devices_page)->obj, id(lights_group_page)->obj, id(fans_group_page)->obj,
            id(people_page)->obj,
          };
          for (auto* p : pages) {
            lv_obj_set_style_bg_color(p, bg, LV_PART_MAIN);
          }

          // ── Home page panels ─────────────────────────────────────────────
          lv_obj_t* home_panels[] = {
            id(home_bg_indicators), id(home_bg_weather_time),
            id(home_bg_weather),    id(home_bg_calendar),
          };
          for (auto* panel : home_panels) {
            lv_obj_set_style_bg_color(panel, surface, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(panel, surf_opa, LV_PART_MAIN);
          }

          // ── Settings page panels ─────────────────────────────────────────
          lv_obj_t* settings_panels[] = {
            id(theme_bg), id(language_bg), id(backlight_bg), id(sleep_mode_bg),
            id(clock_format_bg), id(temp_unit_bg), id(screensaver_style_bg),
          };
          for (auto* panel : settings_panels) {
            lv_obj_set_style_bg_color(panel, surface, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(panel, surf_opa, LV_PART_MAIN);
          }

          // ── Key text labels ──────────────────────────────────────────────
          lv_obj_t* labels[] = {
            id(display_time), id(display_date),
            id(theme_label), id(language_label),
            id(display_backlight_label), id(display_timeout_label),
          };
          for (auto* lbl : labels) {
            lv_obj_set_style_text_color(lbl, text, LV_PART_MAIN);
          }

          // ── Theme dropdown sync ──────────────────────────────────────────
          lv_dropdown_set_selected(id(theme_dropdown)->obj, id(current_theme));

          // ── Clock format toggle sync ──────────────────────────────────────
          if (id(time_format) == 0) {
            lv_obj_set_style_bg_color(id(clock_12h_btn), lv_palette_lighten(LV_PALETTE_BLUE, 2), LV_PART_MAIN);
            lv_obj_set_style_bg_color(id(clock_24h_btn), surface, LV_PART_MAIN);
          } else {
            lv_obj_set_style_bg_color(id(clock_12h_btn), surface, LV_PART_MAIN);
            lv_obj_set_style_bg_color(id(clock_24h_btn), lv_palette_lighten(LV_PALETTE_BLUE, 2), LV_PART_MAIN);
          }

          // ── Temperature unit toggle sync ──────────────────────────────────
          if (id(temp_unit) == 0) {
            lv_obj_set_style_bg_color(id(temp_f_btn), lv_palette_lighten(LV_PALETTE_BLUE, 2), LV_PART_MAIN);
            lv_obj_set_style_bg_color(id(temp_c_btn), surface, LV_PART_MAIN);
          } else {
            lv_obj_set_style_bg_color(id(temp_f_btn), surface, LV_PART_MAIN);
            lv_obj_set_style_bg_color(id(temp_c_btn), lv_palette_lighten(LV_PALETTE_BLUE, 2), LV_PART_MAIN);
          }

          // ── Screensaver style toggle sync ─────────────────────────────────
          lv_obj_set_style_bg_color(id(ss_digital_btn),  surface, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(ss_analog_btn),   surface, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(ss_calendar_btn), surface, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(ss_none_btn),     surface, LV_PART_MAIN);
          if (id(screensaver_style) == 0)
            lv_obj_set_style_bg_color(id(ss_digital_btn),  lv_palette_lighten(LV_PALETTE_BLUE, 2), LV_PART_MAIN);
          else if (id(screensaver_style) == 1)
            lv_obj_set_style_bg_color(id(ss_analog_btn),   lv_palette_lighten(LV_PALETTE_BLUE, 2), LV_PART_MAIN);
          else if (id(screensaver_style) == 2)
            lv_obj_set_style_bg_color(id(ss_calendar_btn), lv_palette_lighten(LV_PALETTE_BLUE, 2), LV_PART_MAIN);
          else
            lv_obj_set_style_bg_color(id(ss_none_btn),     lv_palette_lighten(LV_PALETTE_BLUE, 2), LV_PART_MAIN);

          // ── Theme background images ──────────────────────────────────────
          // Hide all backgrounds first, then show the active one
          lv_obj_add_flag(id(paris_tower_bg), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(espeon_bg),      LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(patriotic_bg),   LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(cherry_bg),      LV_OBJ_FLAG_HIDDEN);
          if (theme == 0) {        // Cherry Blossom
            lv_obj_clear_flag(id(cherry_bg),      LV_OBJ_FLAG_HIDDEN);
          } else if (theme == 2) { // Espeon
            lv_obj_clear_flag(id(espeon_bg),      LV_OBJ_FLAG_HIDDEN);
          } else if (theme == 4) { // Paris
            lv_obj_clear_flag(id(paris_tower_bg), LV_OBJ_FLAG_HIDDEN);
          } else if (theme == 5) { // Patriotic
            lv_obj_clear_flag(id(patriotic_bg),   LV_OBJ_FLAG_HIDDEN);
          }

  # ── get_translation ──────────────────────────────────────────────────────
  # Looks up a translated string for a given component + key.
  # Returns the key itself as a fallback if no translation is found.
  - id: get_translation
    parameters:
      component_param: string
      key_param: string
    then:
      - lambda: |-
          std::string component = component_param;
          std::string key = key_param;
          std::string result = key;

          if (component == "vacuum") {
            auto it = id(vacuum_translations).find(key);
            if (it != id(vacuum_translations).end()) result = it->second;
          } else if (component == "cover") {
            auto it = id(cover_translations).find(key);
            if (it != id(cover_translations).end()) result = it->second;
          } else if (component == "climate") {
            auto it = id(climate_translations).find(key);
            if (it != id(climate_translations).end()) result = it->second;
          } else if (component == "weather") {
            auto it = id(weather_translations).find(key);
            if (it != id(weather_translations).end()) result = it->second;
          } else if (component == "alarm_panel") {
            auto it = id(alarm_panel_translations).find(key);
            if (it != id(alarm_panel_translations).end()) result = it->second;
          }
