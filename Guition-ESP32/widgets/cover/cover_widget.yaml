# cover_widget.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Single cover/blind detail page.  Include 1–6 times via covers_config.yaml.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:

  exit_icon: "\U0000e902"
  home_icon:  "\U0000e906"

  # Safe defaults – overridden per-slot by covers_config.yaml vars
  cover_entity:  "sensor.disabled"
  widget_name:   "cover_default"

# ── Globals ──────────────────────────────────────────────────────────────────
globals:
  - id: ${widget_name}_is_disabled
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_current_position
    type: int
    initial_value: '0'
  - id: ${widget_name}_is_open
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_updating_from_ha
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_ha_data_received
    type: bool
    initial_value: 'false'
  - id: ${widget_name}_sensors_ready_count
    type: int
    initial_value: '0'

# ── Boot: resolve disabled flag ───────────────────────────────────────────────
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          if (std::string("${cover_entity}") == "sensor.disabled") {
            id(${widget_name}_is_disabled) = true;
          }

# ── Position sensor ───────────────────────────────────────────────────────────
sensor:
  - platform: homeassistant
    id: ${widget_name}_cover_position_sensor
    entity_id: "${cover_entity}"
    attribute: current_position
    filters:
      - filter_out: nan
    on_value:
      - if:
          condition:
            lambda: 'return id(${widget_name}_is_disabled);'
          then: []
          else:
            - lambda: |-
                static bool first = false;
                if (!first) { first = true; id(${widget_name}_sensors_ready_count) += 1; }
            - if:
                condition:
                  lambda: 'return !id(${widget_name}_updating_from_ha);'
                then:
                  - globals.set:
                      id: ${widget_name}_current_position
                      value: !lambda return (int)x;
                  - lvgl.bar.update:
                      id: ${widget_name}_cover_pos_bar
                      value: !lambda return (int)x;
                  - lvgl.slider.update:
                      id: ${widget_name}_cover_pos_slider
                      value: !lambda return (int)x;
                  - lvgl.label.update:
                      id: ${widget_name}_cover_pos_label
                      text: !lambda |-
                        char buf[8];
                        snprintf(buf, sizeof(buf), "%d%%", (int)x);
                        return std::string(buf);
            - script.execute: ${widget_name}_check_cover_ready

# ── State text sensor ─────────────────────────────────────────────────────────
text_sensor:
  - platform: homeassistant
    id: ${widget_name}_cover_state_sensor
    entity_id: "${cover_entity}"
    on_value:
      - if:
          condition:
            lambda: 'return id(${widget_name}_is_disabled);'
          then: []
          else:
            - lambda: |-
                id(${widget_name}_is_open) = (x == "open" || x == "opening");
                static bool first = false;
                if (!first) { first = true; id(${widget_name}_sensors_ready_count) += 1; }
            - if:
                condition:
                  lambda: 'return id(${widget_name}_is_open);'
                then:
                  - lvgl.label.update:
                      id: ${widget_name}_cover_tile_icon
                      text_color: color_amber
                  - lvgl.label.update:
                      id: ${widget_name}_cover_state_lbl
                      text_color: color_amber
                else:
                  - lvgl.label.update:
                      id: ${widget_name}_cover_tile_icon
                      text_color: color_steel_blue
                  - lvgl.label.update:
                      id: ${widget_name}_cover_state_lbl
                      text_color: color_misty_blue
            - lvgl.label.update:
                id: ${widget_name}_cover_state_lbl
                text: !lambda return x;
            - script.execute: ${widget_name}_check_cover_ready

  - platform: homeassistant
    id: ${widget_name}_cover_friendly_name
    entity_id: "${cover_entity}"
    attribute: friendly_name
    on_value:
      - if:
          condition:
            lambda: 'return !id(${widget_name}_is_disabled);'
          then:
            - lvgl.label.update:
                id: ${widget_name}_cover_title_lbl
                text: !lambda return x;

# ── Detail page ───────────────────────────────────────────────────────────────
lvgl:
  pages:
    - id: ${widget_name}_cover_page
      bg_color: color_slate_blue_gray
      widgets:

        # Title bar
        - button:
            id: ${widget_name}_cover_bg_name
            y: 20
            width: 440
            height: 40
            align: TOP_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_cover_title_lbl
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "cover"

        # Left panel – position bar + percentage + state label
        - button:
            id: ${widget_name}_cover_bg_left
            x: 20
            y: 80
            width: 200
            height: 220
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              # Blind icon
              - label:
                  id: ${widget_name}_cover_tile_icon
                  y: 20
                  align: TOP_MID
                  text_font: mdi_icons_72
                  text_color: color_steel_blue
                  text: "\U000F012F"

              # Horizontal position bar
              - bar:
                  id: ${widget_name}_cover_pos_bar
                  width: 160
                  height: 16
                  y: -40
                  align: BOTTOM_MID
                  min_value: 0
                  max_value: 100
                  value: 0
                  bg_color: color_slate_blue_gray
                  bg_opa: 100%
                  radius: 5
                  indicator:
                    bg_color: color_amber
                    radius: 5

              # Position percentage label
              - label:
                  id: ${widget_name}_cover_pos_label
                  y: -60
                  align: BOTTOM_MID
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "0%"

              # State label (open / closed / opening / closing / stopped)
              - label:
                  id: ${widget_name}_cover_state_lbl
                  y: -12
                  align: BOTTOM_MID
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "---"

        # Right panel – vertical position slider
        - obj:
            id: ${widget_name}_cover_bg_right
            x: -20
            y: 80
            width: 220
            height: 220
            align: TOP_RIGHT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              # Slider background track
              - button:
                  radius: 20
                  width: 100
                  height: 180
                  align: CENTER
                  bg_color: color_slate_blue_gray
                  bg_opa: 100%
                  shadow_opa: TRANSP

              # Position slider (0 = closed / bottom, 100 = open / top)
              - slider:
                  id: ${widget_name}_cover_pos_slider
                  radius: 20
                  width: 100
                  height: 180
                  align: CENTER
                  bg_opa: TRANSP
                  min_value: 0
                  max_value: 100
                  value: 0
                  indicator:
                    bg_color: color_amber
                    radius: 10
                  knob:
                    bg_opa: TRANSP
                  on_release:
                    - if:
                        condition:
                          lambda: >
                            return !id(${widget_name}_is_disabled)
                                && id(${widget_name}_ha_data_received);
                        then:
                          - globals.set:
                              id: ${widget_name}_current_position
                              value: !lambda return (int)x;
                          - if:
                              condition:
                                lambda: 'return x == 0;'
                              then:
                                - homeassistant.service:
                                    service: cover.close_cover
                                    data:
                                      entity_id: "${cover_entity}"
                              else:
                                - if:
                                    condition:
                                      lambda: 'return x == 100;'
                                    then:
                                      - homeassistant.service:
                                          service: cover.open_cover
                                          data:
                                            entity_id: "${cover_entity}"
                                    else:
                                      - homeassistant.service:
                                          service: cover.set_cover_position
                                          data:
                                            entity_id: "${cover_entity}"
                                            position: !lambda return (int)x;

        # Control buttons – Open / Stop / Close
        - button:
            id: ${widget_name}_cover_open_btn
            x: 20
            y: 315
            width: 120
            height: 55
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_amber
                  text: "Open"
            on_press:
              - if:
                  condition:
                    lambda: 'return !id(${widget_name}_is_disabled);'
                  then:
                    - homeassistant.service:
                        service: cover.open_cover
                        data:
                          entity_id: "${cover_entity}"

        - button:
            id: ${widget_name}_cover_stop_btn
            x: 0
            y: 315
            width: 120
            height: 55
            align: TOP_MID
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Stop"
            on_press:
              - if:
                  condition:
                    lambda: 'return !id(${widget_name}_is_disabled);'
                  then:
                    - homeassistant.service:
                        service: cover.stop_cover
                        data:
                          entity_id: "${cover_entity}"

        - button:
            id: ${widget_name}_cover_close_btn
            x: -20
            y: 315
            width: 120
            height: 55
            align: TOP_RIGHT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  align: CENTER
                  text_font: nunito_16
                  text_color: color_steel_blue
                  text: "Close"
            on_press:
              - if:
                  condition:
                    lambda: 'return !id(${widget_name}_is_disabled);'
                  then:
                    - homeassistant.service:
                        service: cover.close_cover
                        data:
                          entity_id: "${cover_entity}"

        # Back button – returns to covers panel
        - button:
            id: ${widget_name}_cover_exit_btn
            x: 20
            y: -20
            width: 200
            height: 80
            align: BOTTOM_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_cover_exit_icon
                  align: CENTER
                  text_font: icons_28
                  text_color: color_misty_blue
                  text: "${exit_icon}"
            on_press:
              then:
                - lvgl.widget.show: menu_controls_main
                - lvgl.page.show:
                    id: covers_group_page
                    animation: OUT_RIGHT
                    time: 300ms

        # Home button – jumps directly to home page
        - button:
            id: ${widget_name}_cover_home_btn
            x: -20
            y: -20
            width: 200
            height: 80
            align: BOTTOM_RIGHT
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${widget_name}_cover_home_icon
                  align: CENTER
                  text_font: icons_36
                  text_color: color_misty_blue
                  text: "${home_icon}"
            on_press:
              then:
                - lvgl.widget.show: menu_controls_main
                - lvgl.page.show:
                    id: home_page
                    animation: OUT_RIGHT
                    time: 300ms

# ── Scripts ───────────────────────────────────────────────────────────────────
script:
  - id: ${widget_name}_check_cover_ready
    mode: restart
    then:
      - delay: 500ms
      - lambda: |-
          if (id(${widget_name}_sensors_ready_count) >= 2) {
            if (!id(${widget_name}_ha_data_received)) {
              id(${widget_name}_ha_data_received) = true;
              id(${widget_name}_updating_from_ha) = false;
            }
          }
