# covers_panel.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Tile grid page for up to 6 cover/blind slots.
# Short-press tile → cover detail page.
# Tile icon colour updates live from HA state (amber = open, steel-blue = closed).
# ─────────────────────────────────────────────────────────────────────────────

substitutions:

  # Sentinel – slots left as "sensor.disabled" in main.yaml are hidden at boot.
  cover_entity_1: "sensor.disabled"
  cover_entity_2: "sensor.disabled"
  cover_entity_3: "sensor.disabled"
  cover_entity_4: "sensor.disabled"
  cover_entity_5: "sensor.disabled"
  cover_entity_6: "sensor.disabled"

  cover_label_name_1: ""
  cover_label_name_2: ""
  cover_label_name_3: ""
  cover_label_name_4: ""
  cover_label_name_5: ""
  cover_label_name_6: ""

  cover_widget_name_1: "cover1"
  cover_widget_name_2: "cover2"
  cover_widget_name_3: "cover3"
  cover_widget_name_4: "cover4"
  cover_widget_name_5: "cover5"
  cover_widget_name_6: "cover6"

  # Per-slot tile icon defaults — override in main.yaml with any icon_library name
  # e.g. cover_icon_1: "curtains" | "garage" | "blinds"
  cover_icon_1:      "curtains"
  cover_icon_font_1: "curtains_font"
  cover_icon_2:      "curtains"
  cover_icon_font_2: "curtains_font"
  cover_icon_3:      "curtains"
  cover_icon_font_3: "curtains_font"
  cover_icon_4:      "curtains"
  cover_icon_font_4: "curtains_font"
  cover_icon_5:      "curtains"
  cover_icon_font_5: "curtains_font"
  cover_icon_6:      "curtains"
  cover_icon_font_6: "curtains_font"

  covers_page_title: "Covers"

# ── Grid layout ───────────────────────────────────────────────────────────────
# Row 1 (y=20):  slot1 x=20  slot2 x=170  slot3 x=320
# Row 2 (y=200): slot4 x=20  slot5 x=170  slot6 x=320

lvgl:
  pages:
    - id: covers_group_page
      bg_color: color_slate_blue_gray
      widgets:

        # ── Page title ──────────────────────────────────────────────────────
        - label:
            id: covers_panel_header
            align: TOP_MID
            y: 20
            text_font: nunito_20
            text_color: color_misty_blue
            text: "${covers_page_title}"

        # ── Divider under title ──────────────────────────────────────────────
        - obj:
            align: TOP_MID
            y: 48
            width: 440
            height: 1
            pad_all: 0
            bg_color: color_misty_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 0

        # ── Slot 1 ─────────────────────────────────────────────────────────
        - button:
            id: ${cover_widget_name_1}_btn
            x: 20
            y: 60
            width: 140
            height: 130
            align: TOP_LEFT
            bg_color: color_steel_blue
            bg_opa: 20%
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: ${cover_widget_name_1}_cover_tile_icon
                  align: TOP_MID
                  y: 8
                  text_font: ${${cover_icon_font_1}}
                  text_color: color_steel_blue
                  text: "${${cover_icon_1}}"
              - label:
                  id: ${cover_widget_name_1}_label_name
