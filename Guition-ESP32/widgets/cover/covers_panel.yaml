# ── Hide unused slots at boot ─────────────────────────────────────────────────
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          struct SlotInfo {
            const char* entity;
            lv_obj_t*   btn;
          };

          SlotInfo slots[] = {
            { "${cover_entity_1}", id(${cover_widget_name_1}_btn) },
            { "${cover_entity_2}", id(${cover_widget_name_2}_btn) },
            { "${cover_entity_3}", id(${cover_widget_name_3}_btn) },
            { "${cover_entity_4}", id(${cover_widget_name_4}_btn) },
            { "${cover_entity_5}", id(${cover_widget_name_5}_btn) },
            { "${cover_entity_6}", id(${cover_widget_name_6}_btn) },
          };

          for (auto& slot : slots) {
            if (std::string(slot.entity) == "sensor.disabled") {
              lv_obj_add_flag(slot.btn, LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(slot.btn, LV_OBJ_FLAG_CLICKABLE);
            }
          }


# ── Tile binary sensors – tap to open detail page ────────────────────────────
binary_sensor:
  - platform: lvgl
    id: ${cover_widget_name_1}_btn_sensor
    widget: ${cover_widget_name_1}_btn
    on_click:
      - min_length: 50ms
        max_length: 500ms
        then:
          - lvgl.widget.hide: menu_controls_main
          - lvgl.page.show:
              id: ${cover_widget_name_1}_cover_page
              animation: OUT_RIGHT
              time: 300ms

